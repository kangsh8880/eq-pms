/* ═══════════════════════════════════════════════════
   📅 커스텀 캘린더 피커
═══════════════════════════════════════════════════ */
var _calState = { targetId: null, year: 0, month: 0 };

function _showCal(inputId, stepIdx) {
  // 이미 열린 캘린더 닫기 (토글)
  var existing = gid('eqCal');
  var wasOpen  = _calState.targetId === inputId;
  if (existing) existing.remove();
  _calState.targetId = null;
  if (wasOpen) return; // 같은 버튼 재클릭 → 닫기

  // ② 순차 검증: 중간 빈 단계를 건너뛰고 가장 가까운 이전/이후 날짜 탐색
  _calState.stepIdx = (stepIdx !== undefined) ? stepIdx : -1;
  _calState.minDate = null;
  _calState.maxDate = null;

  if (_calState.stepIdx >= 0) {
    // 직전 방향으로 값이 있는 가장 가까운 단계 찾기
    for (var pi = _calState.stepIdx - 1; pi >= 0; pi--) {
      var prevInp = gid('eqM_tgt_' + pi);
      if (prevInp && prevInp.value) {
        _calState.minDate = prevInp.value;
        break;
      }
    }
    // 직후 방향으로 값이 있는 가장 가까운 단계 찾기
    for (var ni = _calState.stepIdx + 1; ni < INVEST_STEPS.length; ni++) {
      var nextInp = gid('eqM_tgt_' + ni);
      if (nextInp && nextInp.value) {
        _calState.maxDate = nextInp.value;
        break;
      }
    }
  }

  var inp = gid(inputId);
  if (!inp) return;
  _calState.targetId = inputId;

  var today = new Date();
  var cur   = inp.value ? new Date(inp.value + 'T00:00:00') : today;
  _calState.year  = cur.getFullYear();
  _calState.month = cur.getMonth();

  _renderCal();
}

function _renderCal(anchorInp) {
  var old = gid('eqCal');
  if (old) old.remove();

  var y = _calState.year, m = _calState.month;
  var inp = gid(_calState.targetId);
  var selVal = inp ? inp.value : '';

  var MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var DAYS   = ['일','월','화','수','목','금','토'];

  var first  = new Date(y, m, 1).getDay();
  var lastD  = new Date(y, m+1, 0).getDate();
  var today  = new Date(); today.setHours(0,0,0,0);

  var grid = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px">';
  DAYS.forEach(function(d, i) {
    grid += '<div style="text-align:center;font-size:11px;font-weight:600;color:'+(i===0?'var(--re)':i===6?'var(--ac)':'var(--t2)')+'padding:3px 0">' + d + '</div>';
  });
  for (var bi = 0; bi < first; bi++) grid += '<div></div>';
  for (var d = 1; d <= lastD; d++) {
    var dt   = new Date(y, m, d);
    var dStr = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var dow  = dt.getDay();
    var isToday = dt.getTime() === today.getTime();
    var isSel   = dStr === selVal;
    // ② 순차 검증: min/max 날짜 범위 외 비활성
    var disabled = false;
    if (_calState.minDate && dStr < _calState.minDate) disabled = true;
    if (_calState.maxDate && dStr > _calState.maxDate) disabled = true;
    var bg   = isSel ? 'var(--ac)' : isToday ? 'rgba(88,166,255,.18)' : 'transparent';
    var col  = disabled ? 'var(--bd)' : isSel ? '#fff' : dow===0 ? 'var(--re)' : dow===6 ? 'var(--ac)' : 'var(--tx)';
    var fw   = isSel||isToday ? '700' : '400';
    if (disabled) {
      grid += '<div style="text-align:center;padding:5px 2px;border-radius:5px;font-size:13px;color:' + col + ';cursor:not-allowed;opacity:.4">' + d + '</div>';
    } else {
      grid += '<div onclick="_pickDate(\'' + dStr + '\')" style="text-align:center;padding:5px 2px;border-radius:5px;font-size:13px;cursor:pointer;background:' + bg + ';color:' + col + ';font-weight:' + fw + ';transition:background .12s" onmouseover="this.style.opacity=.75" onmouseout="this.style.opacity=1">' + d + '</div>';
    }
  }
  grid += '</div>';

  var cal = document.createElement('div');
  cal.id = 'eqCal';
  cal.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    + '<button onclick="_calMove(-1)" style="background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);cursor:pointer;width:26px;height:26px;font-size:15px;display:flex;align-items:center;justify-content:center">‹</button>'
    + '<span style="font-size:14px;font-weight:700">' + y + t('lbl_order') + ' ' + MONTHS[m] + '</span>'
    + '<button onclick="_calMove(1)"  style="background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);cursor:pointer;width:26px;height:26px;font-size:15px;display:flex;align-items:center;justify-content:center">›</button>'
    + '</div>'
    + '<div onclick="_calClear()" style="text-align:center;font-size:11px;color:var(--re);cursor:pointer;margin-bottom:4px;padding:2px">✕ 날짜 지우기</div>'
    + grid;

  cal.style.cssText = 'position:fixed;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px 10px;width:240px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.6)';

  // 위치 계산 - 버튼 바로 아래에 표시 (fixed 기준)
  var btnEl = gid(_calState.targetId + '_btn') || gid(_calState.targetId);
  if (btnEl) {
    var rect = btnEl.getBoundingClientRect();
    var calW = 240, calH = 280;
    var left = rect.left;
    var top  = rect.bottom + 4;
    // 화면 오른쪽 넘침 방지
    if (left + calW > window.innerWidth - 8) left = window.innerWidth - calW - 8;
    // 화면 아래 넘침 방지 → 위로 표시
    if (top + calH > window.innerHeight - 8) top = rect.top - calH - 4;
    if (left < 4) left = 4;
    cal.style.left = left + 'px';
    cal.style.top  = top  + 'px';
  }
  document.body.appendChild(cal);
}

function _calMove(dir) {
  _calState.month += dir;
  if (_calState.month > 11) { _calState.month = 0;  _calState.year++; }
  if (_calState.month < 0)  { _calState.month = 11; _calState.year--; }
  _renderCal();
}

function _pickDate(dStr) {
  var inp = gid(_calState.targetId);
  if (inp) {
    inp.value = dStr;
    // 버튼 라벨 및 색상 업데이트
    var btn = gid(_calState.targetId + '_btn');
    var lbl = gid(_calState.targetId + '_lbl');
    if (btn) btn.style.color = 'var(--ac)';
    if (lbl) lbl.textContent = dStr;

    // 선택한 날짜가 이후 단계보다 크거나 같으면 이후 단계 날짜 초기화
    var si = _calState.stepIdx;
    if (si >= 0) {
      for (var ni = si + 1; ni < INVEST_STEPS.length; ni++) {
        var nInp = gid('eqM_tgt_' + ni);
        if (nInp && nInp.value && nInp.value < dStr) {
          nInp.value = '';
          var nBtn = gid('eqM_tgt_' + ni + '_btn');
          var nLbl = gid('eqM_tgt_' + ni + '_lbl');
          if (nBtn) nBtn.style.color = 'var(--t3)';
          if (nLbl) nLbl.textContent = '날짜 선택';
        } else { break; }
      }
      // 선택한 날짜가 이전 단계보다 작거나 같으면 이전 단계 날짜 초기화
      for (var pi = si - 1; pi >= 0; pi--) {
        var pInp = gid('eqM_tgt_' + pi);
        if (pInp && pInp.value && pInp.value > dStr) {
          pInp.value = '';
          var pBtn = gid('eqM_tgt_' + pi + '_btn');
          var pLbl = gid('eqM_tgt_' + pi + '_lbl');
          if (pBtn) pBtn.style.color = 'var(--t3)';
          if (pLbl) pLbl.textContent = '날짜 선택';
        } else { break; }
      }
    }
  }
  var cal = gid('eqCal');
  if (cal) cal.remove();
  _calState.targetId = null;
}

function _calClear() {
  var inp = gid(_calState.targetId);
  if (inp) {
    inp.value = '';
    var btn = gid(_calState.targetId + '_btn');
    var lbl = gid(_calState.targetId + '_lbl');
    if (btn) btn.style.color = 'var(--t3)';
    if (lbl) lbl.textContent = '날짜 선택';
  }
  var cal = gid('eqCal');
  if (cal) cal.remove();
  _calState.targetId = null;
}

/* ═══════════════════════════════════════════════════
   설비 추가/수정 모달

function _openEqModal(coId, idx, eq) {
  var isEdit = idx !== null && idx !== undefined;

  // ① 기업명 (상단 대형 표시)
  var co = state.companies.find(function(c){ return c.id === coId; }) || {};
  var coNm = co.name || coId;

  // 공정/업체 옵션
  var coGongs = _getGong(coId);
  var coVends = _getVend(coId);
  var gOpts = coGongs.map(function(g){
    var sel = eq && eq.gongCode === g.code ? ' selected' : '';
    return '<option value="' + xe(g.code) + '"' + sel + '>[' + xe(g.code) + '] ' + xe(g.name) + '</option>';
  }).join('');
  var vOpts = '<option value="">' + t('sel_co') + '</option>' +
    coVends.map(function(v){
      var sel = eq && eq.vendCode === v.code ? ' selected' : '';
      return '<option value="' + xe(v.code) + '"' + sel + '>' + xe(v.name) + '</option>';
    }).join('');

  // 담당자 초기값 (기업별 Master에서)

/* 공정 선택 시 기업 담당자 자동입력 */
function _eqAutoFillGong() {
  var coId = gid('eqM_coId') ? gid('eqM_coId').value : null;
  var code = gid('eqM_gong').value;
  var g = _getGong(coId).find(function(x){ return x.code === code; });
  var mgr = gid('eqM_umgr'), tel = gid('eqM_utel');
  if (g) {
    if (mgr) { mgr.value = g.manager || ''; mgr.style.color = g.manager ? 'var(--gr)' : ''; }
    if (tel) { tel.value = g.contact  || ''; tel.style.color = g.contact  ? 'var(--gr)' : ''; }
  } else {
    if (mgr && !code) { mgr.value = ''; mgr.style.color = ''; }
    if (tel && !code) { tel.value = ''; tel.style.color = ''; }
  }
}

/* 업체 선택 시 설비업체 담당자 자동입력 */
function _eqAutoFillVend() {

function _closeEqModal() {
  var w = gid('eqMdlWrap');

}

function _saveEqModal(coId, idx) {
  var nm   = (gid('eqM_nm').value||'').trim();
  var gong = gid('eqM_gong').value;
  var vend = gid('eqM_vend').value;
  if (!nm) { alert('설비명을 입력하세요.'); return; }

  var isEdit = idx !== null && idx !== 'null' && idx !== '';
  var oldEq  = isEdit ? ((state.equipments[coId]||[])[parseInt(idx)] || {}) : {};

  var vObj = _getVend(coId).find(function(v){ return v.code === vend; }) || {};
  var gObj = _getGong(coId).find(function(g){ return g.code === gong; }) || {};

  // ── 목표일/실적일 처리 ──
  // 신규: 모달 입력값 사용 (비어있으면 빈 문자열), actual 완전 초기화
  // 수정: 기존 target 유지 + 모달 수정값 반영, actual 유지
  var newTarget = {};
  INVEST_STEPS.forEach(function(s, si) {
    var inp = gid('eqM_tgt_' + si);
    if (isEdit) {
      // 수정: 기존값 우선, 모달 입력값으로 덮어씀
      newTarget[si] = inp ? (inp.value || '') : ((oldEq.target||{})[si] || '');
    } else {
      // 신규: 모달 입력값만 (빈 값이면 빈 문자열)
      newTarget[si] = inp ? (inp.value || '') : '';
    }
  });

  var eq = {
    name:     nm,
    gongCode: gong,
    vendCode: vend,
    vendNm:   vObj.name || '',
    poNo:     (gid('eqM_po').value||'').trim(),
    eqId:     (gid('eqM_eqid').value||'').trim(),
    model:    (gid('eqM_md').value||'').trim(),
    qty:      '1',
    vendMgr:  (gid('eqM_vmgr').value||'').trim() || vObj.manager || '',
    vendTel:  (gid('eqM_vtel').value||'').trim() || vObj.contact || '',
    utiMgr:   (gid('eqM_umgr').value||'').trim() || gObj.manager || '',
    utiTel:   (gid('eqM_utel').value||'').trim() || gObj.contact || '',
    note:     (gid('eqM_note').value||'').trim(),
    target:   newTarget,
    // 신규: actual 완전 초기화 / 수정: 기존 actual 유지
    actual:   isEdit ? (oldEq.actual || {}) : {},
    // 신규: chkActual(상세 체크리스트 완료일) 초기화 / 수정: 유지
    chkActual: isEdit ? (oldEq.chkActual || {}) : {},
    regDate:  oldEq.regDate || new Date().toLocaleDateString('ko-KR')
  };

  if (!state.equipments[coId]) state.equipments[coId] = [];
  if (isEdit) {
    state.equipments[coId][parseInt(idx)] = eq;
  } else {
    state.equipments[coId].push(eq);
  }
  saveAll();
  _closeEqModal();
  // ① 신규 등록: 기업관리 / ② 수정: 설비투자진척 으로 분기
  if (isEdit) {
    navTo('equip');
    setTimeout(function(){
      var sel = document.getElementById('eqCoSel2');
      if (sel && sel.value !== coId) { sel.value = coId; loadEquipTbl(); }
    }, 80);
  } else {
    _coTab = 'company';
    navTo('company');
  }
  toast('저장 완료', nm + ' 설비가 '+t('msg_saved'), 'success');
}

function eqDel(coId, idx) {
  var eq = (state.equipments[coId]||[])[idx];
  if (!eq) return;
  if (!confirm('[' + eq.name + '] 설비를 삭제하시겠습니까?\n(모든 날짜 데이터가 삭제됩니다)')) return;
  state.equipments[coId].splice(idx, 1);
  saveAll();
  renderEquipTbl();
  toast('삭제 완료', eq.name + ' 삭제됐습니다.', 'success');
}

function _dtLoadCo(keepEq) {
  var coId = document.getElementById('dtCoSel') ? document.getElementById('dtCoSel').value : '';

  if (!coId) { _dtClear(); return; }
  var eqs = state.equipments[coId] || [];
  eqs.forEach(function(eq, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = (i+1) + (idx+1) + '. ' + eq.name;

function _dtRenderStepBar() {
  var sb = document.getElementById('dtStepBar');
  if (!sb) return;
  var coId = _dtCoId;
  var eq   = (state.equipments[coId]||[])[_dtEqIdx];
  if (!eq) return;
  var today = new Date().toISOString().slice(0,10);

  // ① 각 프로세스 칸에 목표일 + 실적일 모두 표시
  var html = '<div style="display:flex;gap:0;background:var(--bg2);border:1px solid var(--bd);border-bottom:none">';
  INVEST_STEPS.forEach(function(_stepNm, si) {
    var stepNm = getStepName(si);
    var tgt = (eq.target||{})[si] || '';
    var act = (eq.actual||{})[si] || '';
    var isActive = _dtStepIdx === si;
    var isDelaySt = act && tgt && act > tgt;  // 실적일 > 목표일 = 지연
    var icon = act ? (isDelaySt ? '🔴' : '✅') : (tgt && today > tgt) ? '⚠️' : tgt ? '📅' : '⬜';
    var tgtColor = tgt ? ((!act && tgt < today) ? 'var(--re)' : isDelaySt ? 'var(--re)' : 'var(--ac)') : 'var(--t3)';
    var actColor = act ? (isDelaySt ? 'var(--re)' : 'var(--gr)') : 'var(--t3)';

    var sInfo = _dtCalcStepInfo(si);
    var sPct  = sInfo.pct;
    var sPctColor = sPct===100 ? 'var(--gr)' : sPct>0 ? 'var(--ac)' : 'var(--t3)';
    html += '<div onclick="_dtSelStep(' + si + ')"'
      + ' style="flex:1;min-width:60px;padding:8px 4px 6px;text-align:center;cursor:pointer;border-right:1px solid var(--bd);box-sizing:border-box;'
      + 'background:' + (isActive ? 'rgba(88,166,255,.13)' : 'transparent') + ';'
      + 'border-bottom:' + (isActive ? '3px solid var(--ac)' : isDelaySt ? '3px solid var(--re)' : '3px solid transparent') + ';'
      + 'transition:background .12s">'
      // 아이콘
      + '<div style="font-size:16px;margin-bottom:2px">' + icon + '</div>'
      // 단계명
      + '<div style="font-size:16px;font-weight:' + (isActive?'700':'500') + ';color:' + (isActive?'var(--ac)':isDelaySt?'var(--re)':'var(--t2)') + ';line-height:1.2;margin-bottom:3px;word-break:keep-all">' + xe(stepNm) + '</div>'
      // 목표일/실적일
      + '<div style="font-size:15px;font-family:monospace;color:' + tgtColor + ';margin-bottom:1px">' + (tgt || '—') + '</div>'
      + '<div style="font-size:15px;font-family:monospace;color:' + actColor + ';margin-bottom:4px">' + (act || '—') + '</div>'
      // 진행률 바 + 숫자
      + (sInfo.total > 0
        ? '<div style="margin:0 4px 1px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden"><div style="width:' + sPct + '%;height:100%;background:' + sPctColor + ';border-radius:2px"></div></div>'
          + '<div style="font-size:14px;color:' + sPctColor + '">' + sInfo.done + '/' + sInfo.total + '</div>'
        : '')
      + '</div>';
  });
  html += '</div>';
  sb.innerHTML = html;

  // 설비정보 바 갱신
  var infoBar = document.getElementById('dtEqInfoBar');
  var nameLbl = document.getElementById('dtEqNameLbl');
  var pctLbl  = document.getElementById('dtPctLbl');
  var gongLbl = document.getElementById('dtGongLbl');
  var poLbl   = document.getElementById('dtPoLbl');
  var eqIdLbl = document.getElementById('dtEqIdLbl');
  var mgrLbl  = document.getElementById('dtMgrLbl');

  if (infoBar) infoBar.style.display = 'flex';
  if (nameLbl) nameLbl.textContent = (_dtEqIdx+1) + (idx+1) + '. ' + eq.name;

  // ① 공정명: gongCode로 gongMaster에서 조회
  var gongList = state.gongMaster[coId] || [];
  var gongObj  = gongList.find(function(g){ return g.code === eq.gongCode; }) || {};
  if (gongLbl) gongLbl.textContent = gongObj.name ? '[' + eq.gongCode + '] ' + gongObj.name : (eq.gongCode || '—');

  // ② PO No
  if (poLbl) poLbl.textContent = eq.poNo || '—';

  // ③ EQ_ID
  if (eqIdLbl) eqIdLbl.textContent = eq.eqId || '—';

  // ④ 담당자: gongMaster의 manager 필드
  if (mgrLbl) mgrLbl.textContent = gongObj.manager ? gongObj.manager + (gongObj.contact ? ' (' + gongObj.contact + ')' : '') : (eq.utiMgr || '—');

  // 진행률
  var _info1 = _dtCalcInfo(eq);
  if (pctLbl) pctLbl.innerHTML = '<span style="font-size:19px;color:var(--t2);font-weight:500">' + _info1.done + '/' + _info1.total + '&nbsp;</span><span>' + _info1.pct + '%</span>';
}

  var act  = (eq.actual||{})[si] || '';
  var today = new Date().toISOString().slice(0,10);

function _dtRenderBody() {

  if (!bd) return;

  var eq   = (state.equipments[coId]||[])[_dtEqIdx];
  if (!eq) return;

  var si   = _dtStepIdx;

  // ── 좌우 flex 레이아웃 ──
  // 왼쪽(프로세스 요약): 고정폭 / 오른쪽(체크리스트): 남은 공간
  var html = '<div id="dtSplitWrap" style="display:flex;gap:0;width:100%;box-sizing:border-box;align-items:flex-start">'

  // ── 왼쪽: 프로세스 요약 테이블 ──
  + '<div id="dtLeftPanel" style="flex:0 0 auto;width:500px;min-width:280px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden">'

  + '<th style="padding:7px 8px;text-align:center;color:var(--ac);font-size:15px;border-bottom:1px solid var(--bd)">'+t('dt_hdr_tgt')+'</th>'
  + '<th style="padding:7px 8px;text-align:center;color:var(--t2);font-size:15px;border-bottom:1px solid var(--bd)">상태</th>'
  + (canE ? '<th style="padding:7px 8px;text-align:center;color:var(--gr);font-size:15px;border-bottom:1px solid var(--bd)">'+t('dt_hdr_act')+'</th>' : '')
  + '</tr></thead><tbody>';

  INVEST_STEPS.forEach(function(_stepName, i) {
    var stepName = getStepName(i);
    var t = (eq.target||{})[i] || '';
    var a = (eq.actual||{})[i] || '';
    var isCur = i === si;
    var isDelay = t && a && a > t;
    var overdue = t && !a && today > t;
    var stIcon = a ? (isDelay ? '🔴' : '✅') : overdue ? '⚠️' : t ? '📅' : '⬜';
    var rowBg = isCur ? 'rgba(88,166,255,.1)' : 'transparent';
    html += '<tr style="cursor:pointer;background:' + rowBg + ';border-bottom:1px solid var(--bd2)" onclick="_dtSelStep(' + i + ')">'
      + '<td style="padding:8px 10px;color:var(--t3);font-size:16px;white-space:nowrap">' + (i+1) + '</td>'
      + '<td style="padding:8px 10px;font-size:17px;font-weight:' + (isCur?'700':'400') + ';color:' + (isCur?'var(--ac)':'var(--tx)') + ';white-space:nowrap">' + xe(stepName) + '</td>'
      + '<td style="padding:8px 10px;text-align:center;font-family:monospace;font-size:16px;color:' + (isDelay?'var(--re)':'var(--ac)') + ';white-space:nowrap">' + (t||'-') + '</td>'
      + '<td style="padding:8px 10px;text-align:center;font-size:18px;white-space:nowrap;color:' + (isDelay?'var(--re)':'') + '">' + stIcon + '</td>';
    if (canE) {
      html += '<td style="padding:4px 6px;text-align:center">'
        + '<input type="date" value="' + xe(a) + '" data-si="' + i + '" onchange="_dtSaveDateRow(this)"'
        + ' onclick="event.stopPropagation()"'
        + ' style="padding:4px 6px;background:var(--bg3);border:1px solid ' + (isDelay?'rgba(248,81,73,.5)':'var(--bd)') + ';border-radius:5px;color:' + (isDelay?'var(--re)':'var(--gr)') + ';font-size:14px;font-family:monospace;outline:none;width:150px">'
        + '</td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>'

  // ── 오른쪽: 상세 체크리스트 컨테이너만 먼저 생성 ──
  + '<div id="dtResizer" style="flex:0 0 8px;cursor:col-resize;background:transparent;border-left:2px solid var(--bd);border-right:2px solid var(--bd);margin:0 3px;align-self:stretch" onmouseenter="this.style.background=\'rgba(88,166,255,.3)\'" onmouseleave="this.style.background=\'transparent\'"></div>'
  + '<div id="dtDetailPanel" style="flex:1 1 0;min-width:200px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden">'
  + '</div>'
  + '</div>';

  // innerHTML 먼저 삽입
  bd.innerHTML = html;

  // 상세 체크리스트는 별도로 삽입 (문자열 연결 문제 방지)
  var panel = document.getElementById('dtDetailPanel');
  if (panel) panel.innerHTML = _dtDetailHtml(eq, si, canE);

  // ── 드래그 리사이저 이벤트 ──
  requestAnimationFrame(function() {
    var resizer = document.getElementById('dtResizer');
    var leftPanel = document.getElementById('dtLeftPanel');
    var wrap = document.getElementById('dtSplitWrap');
    if (!resizer || !leftPanel || !wrap) return;
    var startX, startW;
    resizer.addEventListener('mousedown', function(e) {
      startX = e.clientX;
      startW = leftPanel.offsetWidth;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      function onMove(e2) {
        var newW = Math.max(280, Math.min(startW + e2.clientX - startX, wrap.offsetWidth - 220));
        leftPanel.style.width = newW + 'px';
      }
      function onUp() {
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    });
  });
}

/* ── 선택 단계: 기업 Setup 연계 상세 체크리스트 ── */
function _dtDetailHtml(eq, si, canE) {
  var coId = _dtCoId;
  var setup  = state.setups[coId] || {};
  var selIds = setup.sel || [];       // 기업이 선택한 MASTER_DB id 목록
  // 완료 여부: 설비별 eq.chkActual[si][id] 기준
  var chkSi  = (eq && eq.chkActual && eq.chkActual[si]) ? eq.chkActual[si] : {};
  var doneIds = Object.keys(chkSi).map(Number);
  var doneAt  = chkSi;  // {id: date}

  // INVEST_STEPS → MASTER_DB 프로세스명 매핑
  var stepKeywords = [
    '설비투자기획','설비 사양정의','투자심의','발주','제작',
    'FAT','출하(물류/통관)','설치','시운전/SAT','Qual(검증)','양산이관/정산'
  ];
  var kw = stepKeywords[si] || '';

  // 기업이 선택한 항목 중 이 단계에 해당하는 것만
  var allItems = MASTER_DB.filter(function(r){
    return r['프로세스'] && r['프로세스'].indexOf(kw) === 0;
  });
  var items = allItems.filter(function(r){ return selIds.indexOf(r['id']) >= 0; });

  // 선택 항목 없으면 전체 표시 (fallback)
  if (!items.length && allItems.length) items = allItems;

  var doneCnt  = items.filter(function(r){ return chkSi[r['id']]; }).length;
  var totalCnt = items.length;
  var pct      = totalCnt ? Math.round(doneCnt/totalCnt*100) : 0;

  var html = '<div style="padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--bg2)">'
    + '<div>'
    + '<span style="font-size:18px;font-weight:700">📝 ' + xe(getStepName(si)) + ' ' + t('invest_proc_title') + '</span>'

    + '<div class="pg-bar-fill" style="width:' + pct + '%;height:100%;background:var(--gr);border-radius:4px;transition:width .3s"></div>'
    + '</div>'
    + '<span class="dt-pct-lbl" style="font-size:15px;font-weight:700;color:' + (pct===100?'var(--gr)':'var(--ac)') + '">' + pct + '%</span>'
    + '</div>'
    + '</div>';

  if (!items.length) {
    return html + '<div style="padding:32px;text-align:center;color:var(--t2);font-size:15px">해당 단계에 선택된 상세 항목이 없습니다.<br><span style="font-size:13px">프로세스 Setup에서 항목을 추가하세요.</span></div>';
  }

  // 테이블 헤더
  html += '<div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 370px)">'
    + '<table style="width:100%;border-collapse:collapse;font-size:15px;table-layout:fixed">'
    + '<colgroup>'    + '<col style="width:40px">'   // 완료
    + '<col style="width:160px">'  // 세부검토항목
    + '<col>'                       // 체크포인트
    + '<col style="width:66px">'   // 필수여부
    + '<col style="width:110px">'  // 담당부서
    + '<col style="width:130px">'  // 필요문서
    + '<col style="width:70px">'   // 목표일정
    + '<col style="width:140px">'  // 완료일시
    + '</colgroup>'
    + '<thead><tr style="background:var(--bg3);position:sticky;top:0;z-index:1">'
    + '<th style="padding:6px 8px;text-align:center;color:var(--t2);font-size:16px;border-bottom:1px solid var(--bd)">' + t('col_done') + '</th>'
    + '<th style="padding:6px 8px;text-align:left;color:var(--t2);font-size:16px;border-bottom:1px solid var(--bd)">' + t('col_task') + '</th>'

/* ── 체크박스 토글: Setup done/doneAt 구조와 연계 ── */
function _dtChkToggle(inp) {
  var id      = parseInt(inp.dataset.id);
  var si      = parseInt(inp.dataset.si);
  var checked = inp.checked;
  var coId    = _dtCoId;
  var eq      = (state.equipments[coId]||[])[_dtEqIdx];
  if (!eq) return;
  if (!eq.chkActual)     eq.chkActual     = {};
  if (!eq.chkActual[si]) eq.chkActual[si] = {};

  var today = new Date().toISOString().slice(0,10);
  if (checked) {
    eq.chkActual[si][id] = today;
  } else {
    delete eq.chkActual[si][id];
  }
  saveAll();

  // 해당 행 UI 즉시 업데이트
  var tr = inp.closest('tr');
  if (tr) {
    tr.style.background = checked ? 'rgba(63,185,80,.05)' : 'transparent';
    var nameCell = tr.querySelectorAll('td')[1];
    if (nameCell) {
      var span = nameCell.querySelector('div');
      if (span) {
        span.style.color = checked ? 'var(--gr)' : 'var(--tx)';
        span.style.textDecoration = checked ? 'line-through' : 'none';
      }
    }
    // 완료일 셀 업데이트
    var atCell = tr.querySelectorAll('td')[7];
    if (atCell) {
      var atVal = checked ? today : '';
      atCell.innerHTML = checked
        ? '<input type="date" value="' + atVal + '" data-id="' + id + '" data-si="' + si + '" onchange="_dtChkDateChange(this)" style="padding:3px 6px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--gr);font-size:15px;font-family:monospace;outline:none;width:145px">'
        : '<span style="font-size:13px;color:var(--t3)">—</span>';
    }
  }

  // 단계 진행률 갱신 (패널 헤더)
  var setup  = state.setups[coId] || {};
  var selIds = setup.sel || [];
  var stepKeywords = ['설비투자기획','설비 사양정의','투자심의','발주','제작','FAT','출하(물류/통관)','설치','시운전/SAT','Qual(검증)','양산이관/정산'];
  var kw = stepKeywords[si] || '';
  var allItems = MASTER_DB.filter(function(r){ return r['프로세스'] && r['프로세스'].indexOf(kw)===0; });
  var items = selIds.length>0 ? allItems.filter(function(r){ return selIds.indexOf(r['id'])>=0; }) : allItems;
  var chkSi = eq.chkActual[si] || {};
  var doneCnt = items.filter(function(r){ return chkSi[r['id']]; }).length;
  var pct = items.length ? Math.round(doneCnt/items.length*100) : 0;

  var bar = document.querySelector('#dtDetailPanel .pg-bar-fill');
  if (bar) bar.style.width = pct + '%';
  var pctSpans = document.querySelectorAll('#dtDetailPanel .dt-pct-lbl');
  pctSpans.forEach(function(sp){ sp.textContent = pct + '%'; sp.style.color = pct===100?'var(--gr)':'var(--ac)'; });
  var cntSpan = document.querySelector('#dtDetailPanel .dt-cnt-lbl');
  if (cntSpan) cntSpan.textContent = doneCnt + '/' + items.length + '개 완료';

  // 상단 전체 진행률 갱신
  var pctLbl2 = document.getElementById('dtPctLbl');
  if (pctLbl2) { var _i3=_dtCalcInfo(eq); pctLbl2.innerHTML='<span style="font-size:19px;color:var(--t2);font-weight:500">'+_i3.done+'/'+_i3.total+'&nbsp;</span><span>'+_i3.pct+'%</span>'; }

  // 스텝바 갱신
  _dtRenderStepBar();
}

function _dtCalcPct(eq) {
  var done  = INVEST_STEPS.filter(function(s,i){ return !!(eq.actual||{})[i]; }).length;
  var total = INVEST_STEPS.length;
  return Math.round(done / total * 100);
}
function _dtCalcInfo(eq) {
  // 설비별 상세항목 진행률 (eq.chkActual 기준)
  var coId   = _dtCoId;
  var setup  = state.setups[coId] || {};
  var selIds = setup.sel || [];   // 기업이 선택한 MASTER_DB id 목록

  if (selIds.length === 0) {
    return { done: 0, total: 0, pct: 0 };
  }

  // 설비별 완료된 항목: eq.chkActual[si][id] 에 날짜가 있으면 완료
  var chkActual = eq.chkActual || {};
  var doneIds = [];
  Object.keys(chkActual).forEach(function(si) {
    Object.keys(chkActual[si]).forEach(function(id) {
      if (chkActual[si][id]) doneIds.push(parseInt(id));
    });
  });

  var total = selIds.length;
  var done  = selIds.filter(function(id){ return doneIds.indexOf(id) >= 0; }).length;
  return { done: done, total: total, pct: total ? Math.round(done / total * 100) : 0 };
}

/* 특정 단계의 기업 선택항목 진행률 계산 */
function _dtCalcStepInfo(si) {
  // 설비별 단계 진행률 (eq.chkActual[si] 기준)
  var coId   = _dtCoId;
  var setup  = state.setups[coId] || {};
  var selIds = setup.sel || [];
  var eq     = (state.equipments[coId]||[])[_dtEqIdx];
  var stepKeywords = [
    '설비투자기획','설비 사양정의','투자심의','발주','제작',
    'FAT','출하(물류/통관)','설치','시운전/SAT','Qual(검증)','양산이관/정산'
  ];
  var kw = stepKeywords[si] || '';
  var allItems = MASTER_DB.filter(function(r){ return r['프로세스'] && r['프로세스'].indexOf(kw) === 0; });
  var items = selIds.length > 0
    ? allItems.filter(function(r){ return selIds.indexOf(r['id']) >= 0; })
    : allItems;

  // 설비별 완료 항목
  var chkSi = (eq && eq.chkActual && eq.chkActual[si]) ? eq.chkActual[si] : {};
  var total = items.length;
  var done  = items.filter(function(r){ return chkSi[r['id']]; }).length;
  return { done: done, total: total, pct: total ? Math.round(done/total*100) : 0 };
}

function _dtDayDiff(d1, d2) {
  try { return Math.round((new Date(d2)-new Date(d1))/(1000*60*60*24)); } catch(e){ return 0; }
}

function _dtSaveDate(type, val) {
  var coId = _dtCoId;
  var eq   = (state.equipments[coId]||[])[_dtEqIdx];
  if (!eq) return;
  if (type === 'target') { if (!eq.target) eq.target={}; eq.target[_dtStepIdx] = val; }
  else                   { if (!eq.actual) eq.actual={}; eq.actual[_dtStepIdx] = val; }
  saveAll();
  _dtRenderStepBar();  // 스텝바 갱신 (날짜카드도 내부에서 갱신)
  // 요약 테이블 해당 행 직접 업데이트
  var rows = document.querySelectorAll('#dtBody table tbody tr');
  var si = _dtStepIdx;
  if (rows[si]) {
    var t = (eq.target||{})[si]||'', a = (eq.actual||{})[si]||'';
    var today2 = new Date().toISOString().slice(0,10);
    var delay2 = t&&a&&a>t, overdue2 = t&&!a&&today2>t;
    var stIcon2 = a?'✅':overdue2?'⚠️':t?'📅':'⬜';
    var cells = rows[si].querySelectorAll('td');
    if (cells[2]) cells[2].textContent = t||'-';
    if (cells[3]) cells[3].textContent = stIcon2;
    if (cells[4] && type==='actual') cells[4].querySelector('input') && (cells[4].querySelector('input').value = a);
  }
  // 상단 진행률 갱신
  var pctLbl = document.getElementById('dtPctLbl');
  if (pctLbl) { var _i2=_dtCalcInfo(eq); pctLbl.innerHTML='<span style="font-size:19px;color:var(--t2);font-weight:500">'+_i2.done+'/'+_i2.total+'&nbsp;</span><span>'+_i2.pct+'%</span>'; }
  toast(t('save'), getStepName(_dtStepIdx) + ' ' + (type==='target'?t('lbl_tgt_date'):t('lbl_act_date')) + ' ' + t('msg_saved'), 'success');
}

function _dtSaveDateRow(inp) {
  var si  = parseInt(inp.dataset.si);
  var val = inp.value;
  var coId = _dtCoId;
  var eq   = (state.equipments[coId]||[])[_dtEqIdx];
  if (!eq) return;
  if (!eq.actual) eq.actual = {};
  eq.actual[si] = val;
  saveAll();

  // 스텝바 해당 칸 아이콘만 업데이트 (전체 재렌더 금지 → 레이아웃 안깨짐)
  var tgt2 = (eq.target||{})[si]||'';
  var today2 = new Date().toISOString().slice(0,10);
  var icon2 = val ? '✅' : (tgt2&&today2>tgt2) ? '⚠️' : tgt2 ? '📅' : '⬜';
  var stepCells = document.querySelectorAll('#dtStepBar > div > div');
  if (stepCells[si]) {
    var iconEl = stepCells[si].querySelector('div:first-child');
    if (iconEl) iconEl.textContent = icon2;
  }
  // 테이블 상태 아이콘만 업데이트
  var rows = document.querySelectorAll('#dtBody table tbody tr');
  if (rows[si]) {
    var cells = rows[si].querySelectorAll('td');
    var delay2 = tgt2&&val&&val>tgt2, overdue2 = tgt2&&!val&&today2>tgt2;
    if (cells[3]) cells[3].textContent = val?'✅':overdue2?'⚠️':tgt2?'📅':'⬜';
  }
}

/* ── EXPORT ─────────────────────────────────────────── */
function exportMaster() {
  var cols = ['id','프로세스','구분','세부검토항목','체크포인트','필수여부','필요문서','총괄담당부서','합의부서','승인부서','표준일정'];
  var rows = [cols.join(',')];
  state.master.forEach(function(r){
    rows.push(cols.map(function(k){ return '"' + String(r[k]||'').replace(/"/g,'""') + '"'; }).join(','));
  });
  dlCSV(rows.join('\n'), 'master_' + new Date().toISOString().slice(0,10) + '.csv');
}
function expSetup() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) { toast('오류','기업을 먼저 선택하세요.','error'); return; }
  var co = state.companies.filter(function(c){ return c.id===coId; })[0];
  var s  = state.setups[coId] || {};
  if (!(s.sel||[]).length) { toast('오류','선택된 항목이 없습니다.','error'); return; }
  var cols = ['프로세스','구분','세부검토항목','체크포인트','필수여부','필요문서','총괄담당부서','합의부서','승인부서','표준일정','목표일정'];
  var rows = [cols.join(',')];
  state.master.filter(function(r){ return (s.sel||[]).indexOf(r.id)>=0; }).forEach(function(r){
    var c = (s.custom||{})[r.id] || {};
    function cv(f){ return c[f]!==undefined ? c[f] : r[f]||''; }
    var vals = [r['프로세스'],r['구분'],r['세부검토항목'],cv('체크포인트'),cv('필수여부'),cv('필요문서'),cv('총괄담당부서'),cv('합의부서'),cv('승인부서'),r['표준일정']||'',(s.tgt||{})[r.id]||''];
    rows.push(vals.map(function(v){ return '"' + String(v||'').replace(/"/g,'""') + '"'; }).join(','));
  });
  dlCSV(rows.join('\n'), 'setup_' + co.name + '_' + new Date().toISOString().slice(0,10) + '.csv');
}
function dlCSV(data, fname) {
  var blob = new Blob(['\uFEFF' + data], { type:'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  toast('내보내기','CSV 파일 다운로드 중','success');
}

/* ── MODAL ──────────────────────────────────────────── */
function CM(id) { gid(id).style.display = 'none'; }

/* ── 모바일 드로어 ───────────────────────────────────── */
function toggleDrawer() {
  var drawer = gid('mobDrawer');
  var overlay = gid('mobOverlay');
  var btn = gid('hbgBtn');
  var isOpen = drawer.classList.contains('open');
  if (isOpen) {
    drawer.classList.remove('open');
    overlay.classList.remove('show');
    btn.classList.remove('open');
  } else {
    drawer.classList.add('open');
    overlay.classList.add('show');
    btn.classList.add('open');
  }
}
function closeDrawer() {
  var drawer = gid('mobDrawer');
  var overlay = gid('mobOverlay');
  var btn = gid('hbgBtn');
  drawer.classList.remove('open');
  overlay.classList.remove('show');
  if (btn) btn.classList.remove('open');
}
function mobNavTo(p) {
  closeDrawer();
  navTo(p);
  // 모바일 드로어 메뉴 active 상태 업데이트
  document.querySelectorAll('.mob-nb').forEach(function(b) { b.classList.remove('active'); });
  var mb = document.querySelector('.mob-nb[data-mp="' + p + '"]');
  if (mb) mb.classList.add('active');
}

/* ── EVENTS ─────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function(){
  // 창 크기 변경 시 레이아웃 재계산 + 드로어 닫기
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) closeDrawer();
    ['pg_master','pg_setup','pg_progress'].forEach(function(id) {
      var pg = document.getElementById(id);
      if (pg && pg.style.display !== 'none') adjustPageLayout(id);
    });
  });
  // ESC 키로 드로어 닫기
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDrawer();
  });
  // 연락처 입력 숫자/하이픈만 허용 (동적 생성 포함)
  document.addEventListener('input', function(e) {
    var el = e.target;
    if (el && (el.id === 'gM_tel' || el.id === 'vM_tel' || el.id === 'eqM_vtel' || el.id === 'eqM_utel')) {
      var v = el.value.replace(/[^0-9\-]/g, '');
      if (el.value !== v) el.value = v;
    }
  });
  gid('btnLogin').addEventListener('click', doLogin);
  gid('loginPw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  gid('loginId').addEventListener('keydown', function(e){ if(e.key==='Enter') gid('loginPw').focus(); });
  gid('itemModal').addEventListener('click', function(e){ if(e.target===this) CM('itemModal'); });
  gid('coModal').addEventListener('click',   function(e){ if(e.target===this) CM('coModal');   });
});
