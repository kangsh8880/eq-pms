<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EQ-PMS | 설비투자 프로세스 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;
  --bd:#30363d;--bd2:#21262d;
  --tx:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --ac:#58a6ff;--a2:#1f6feb;
  --gr:#3fb950;--g2:#238636;
  --or:#f0883e;--re:#f85149;--pu:#bc8cff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:19px;line-height:1.65}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%)}
.lbox{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:44px 38px;width:400px}
.llogo{display:flex;align-items:center;gap:11px;margin-bottom:26px}
.llogo-ico{width:42px;height:42px;background:linear-gradient(135deg,var(--a2),var(--g2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:26px}
.llogo h1{font-size:22px;font-weight:700}
.llogo p{font-size:17px;color:var(--t2)}
.ltit{font-size:26px;font-weight:700;margin-bottom:5px}
.lsub{color:var(--t2);font-size:18px;margin-bottom:24px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:17px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input{width:100%;padding:9px 13px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:19px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.lbtn{width:100%;padding:11px;background:linear-gradient(135deg,var(--a2),#388bfd);border:none;border-radius:7px;color:#fff;font-size:20px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:4px}
.lbtn:hover{opacity:.9;transform:translateY(-1px)}
.lerr{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:7px;padding:9px 13px;color:var(--re);font-size:18px;margin-top:9px;display:none}
.lhint{margin-top:16px;padding:11px 13px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);border-radius:7px;font-size:17px;color:var(--t2)}
.lhint strong{color:var(--ac)}

/* APP */
#app{display:none}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;gap:12px;height:62px;position:sticky;top:0;z-index:200}
.hdr-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:20px;flex-shrink:0}
.hdr-logo .ico{width:28px;height:28px;background:linear-gradient(135deg,var(--a2),var(--g2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px}
.hnav{display:flex;gap:2px;flex:1;margin-left:4px}
.nb{padding:5px 11px;border-radius:6px;border:none;background:transparent;color:var(--t2);font-size:18px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:var(--bg3);color:var(--tx)}
.nb.active{background:var(--bg3);color:var(--ac)}
.hr{display:flex;align-items:center;gap:9px;margin-left:auto}
.ubadge{display:flex;align-items:center;gap:6px;padding:4px 11px;background:var(--bg3);border:1px solid var(--bd);border-radius:18px;font-size:17px}
.udot{width:6px;height:6px;border-radius:50%;background:var(--gr)}
.urole{color:var(--t2);font-size:15px;background:var(--bg);padding:1px 5px;border-radius:3px}
.lout{padding:4px 10px;border:1px solid var(--bd);border-radius:5px;background:transparent;color:var(--t2);font-size:17px;cursor:pointer;font-family:inherit;transition:all .15s}
.lout:hover{border-color:var(--re);color:var(--re)}

/* MAIN */
.main{padding:24px 28px;max-width:100%;margin:0}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.pt{font-size:25px;font-weight:700}
.ps{font-size:17px;color:var(--t2);margin-top:2px}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:22px 24px}
.sl{font-size:16px;color:var(--t2);margin-bottom:5px;font-weight:500}
.sv{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ss{font-size:16px;color:var(--t2);margin-top:2px}

/* STEP BAR */
.psbar{display:flex;margin-bottom:20px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.ps{flex:1;padding:16px 8px;text-align:center;font-size:15px;font-weight:500;color:var(--t2);cursor:pointer;border-right:1px solid var(--bd);transition:all .15s;position:relative}
.ps:last-child{border-right:none}
.ps:hover{background:var(--bg3);color:var(--tx)}
.ps.active{background:rgba(88,166,255,.15);color:var(--ac);border-bottom:2px solid var(--ac)}
.pse{font-size:24px;display:block;margin-bottom:3px}
.pss{font-size:17px;line-height:1.4;word-break:keep-all;font-weight:600}
.psn{position:absolute;top:4px;right:5px;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;font-size:14px;padding:2px 6px;color:var(--t2)}
.ps.active .psn{background:rgba(88,166,255,.2);border-color:rgba(88,166,255,.4);color:var(--ac);font-weight:700}

/* FILTER */
.flt{display:flex;gap:8px;margin-bottom:13px;align-items:center;flex-wrap:wrap}
.si{flex:1;min-width:180px;padding:9px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--t3)}
.fsel{padding:9px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;cursor:pointer}

/* TABLE */
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--bd)}
.m-scroll-body .tw{border:none;border-radius:0}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed;word-break:break-all;font-size:18px}
.tbl thead tr{background:var(--bg3);border-bottom:1px solid var(--bd)}
.tbl th{padding:12px 14px;text-align:left;font-weight:600;color:var(--t2);font-size:16px;white-space:nowrap;border-right:1px solid var(--bd2)}
.tbl th:last-child{border-right:none}
.tbl tbody tr{border-bottom:1px solid var(--bd2);transition:background .1s}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--bg3)}
.tbl td{padding:8px 12px;border-right:1px solid var(--bd2);vertical-align:middle;line-height:1.4}
.tbl td:last-child{border-right:none}
.fw{font-weight:500;min-width:110px;word-break:keep-all}
.sm{font-size:17px}
.t2{color:var(--t2)}
.t3{color:var(--t3)}
.mono{font-family:'JetBrains Mono',monospace}

/* BADGES */
.b{display:inline-flex;align-items:center;padding:1px 6px;border-radius:9px;font-size:16px;font-weight:500;white-space:nowrap}
.br{background:rgba(63,185,80,.12);color:var(--gr);border:1px solid rgba(63,185,80,.25)}
.bo{background:rgba(88,166,255,.12);color:var(--ac);border:1px solid rgba(88,166,255,.25)}
.bc{background:rgba(240,136,62,.12);color:var(--or);border:1px solid rgba(240,136,62,.25)}
.bw{background:rgba(188,140,255,.12);color:var(--pu);border:1px solid rgba(188,140,255,.25)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:18px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--a2);color:#fff}.bp:hover{background:#388bfd}
.bg{background:var(--g2);color:#fff}.bg:hover{background:#2ea043}
.bs{background:var(--bg3);border:1px solid var(--bd);color:var(--tx)}.bs:hover{background:var(--bg4)}
.bd{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.28);color:var(--re)}.bd:hover{background:rgba(248,81,73,.22)}
.bw{background:rgba(240,136,62,.12);border:1px solid rgba(240,136,62,.28);color:var(--or)}.bw:hover{background:rgba(240,136,62,.22)}
.bsm{padding:4px 9px;font-size:17px}
.bxs{padding:2px 7px;font-size:16px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:22px}
.ch{font-size:18px;font-weight:600;display:block;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.mt14{margin-top:14px}
.mb7{margin-bottom:7px}
.mb9{margin-bottom:9px}
.mb12{margin-bottom:12px}
.mt8{margin-top:8px}
.mt10{margin-top:10px}
.flex-sb{display:flex;justify-content:space-between;align-items:center}
.flex-g{display:flex;gap:7px;align-items:center}
.flex4{display:flex;gap:12px;flex-wrap:wrap}
.ml-auto{margin-left:auto}

/* PROGRESS BAR */
.pb{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g2),var(--gr));transition:width .5s ease}

/* CHART BARS */
.brow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.blbl{width:65px;font-size:16px;color:var(--t2);text-align:right;flex-shrink:0}
.btrack{flex:1;background:var(--bg3);border-radius:3px;height:16px;position:relative}
.bfill{height:100%;background:linear-gradient(90deg,var(--a2),var(--ac));border-radius:3px}
.bval{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--t2);font-family:'JetBrains Mono',monospace}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;font-size:14px;background:var(--bg3);border:1px solid var(--bd);color:var(--t2);white-space:normal;word-break:keep-all;text-align:center;line-height:1.4}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--t2)}
.ei{font-size:42px;margin-bottom:10px}
.empty h3{font-size:20px;margin-bottom:5px;color:var(--tx)}

/* TOAST */
.tw2{position:fixed;top:60px;right:14px;z-index:9000;display:flex;flex-direction:column;gap:6px}
#tw{display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 13px;min-width:250px;animation:tin .22s ease;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(63,185,80,.4)}
.toast.error{border-color:rgba(248,81,73,.4)}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mdl{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;width:700px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.mhdr{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mhdr h3{font-size:20px;font-weight:600}
.mcls{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mcls:hover{border-color:var(--re);color:var(--re)}
.mbdy{padding:20px}
.mftr{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.s1{grid-template-columns:1fr}
.flbl{font-size:16px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.finp,.fslc,.fta{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;transition:border-color .2s}
.finp:focus,.fslc:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(88,166,255,.1)}
.fta{resize:vertical;min-height:65px}
.fdiv{display:flex;align-items:center;gap:8px;margin:14px 0 10px}
.fdln{flex:1;height:1px;background:var(--bd)}
.fdlb{font-size:15px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* HIGHLIGHT */
.hl,mark.hl{background:rgba(240,200,62,.3);border-radius:2px;padding:0 2px;font-style:normal}

/* ─── SETUP PAGE ─────────────────────────────────── */
.topbar{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar select{max-width:260px;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;cursor:pointer}
.topbar select:focus{border-color:var(--ac)}
.info-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);border-radius:14px;font-size:17px;color:var(--gr);font-weight:500}

.s3col { display:grid; grid-template-columns:220px 1fr 1fr; gap:18px; flex:1 1 0; min-height:0; }
.spanel { background:var(--bg2); border:1px solid var(--bd); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
.shdr{padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--bg3);display:flex;align-items:center;justify-content:space-between;font-size:18px;font-weight:600;gap:8px;flex-wrap:wrap}
.ssearch{padding:7px 11px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.ssearch input{width:100%;padding:5px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:17px;font-family:inherit;outline:none;transition:border-color .15s}
.ssearch input:focus{border-color:var(--ac)}

/* Proc list */
#sProcList,#sMastBody,#sSelBody{flex:1;overflow-y:auto}
.pi{padding:10px 14px;border-bottom:1px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .12s}
.pi:last-child{border-bottom:none}
.pi:hover{background:var(--bg3)}
.pi.active{background:rgba(88,166,255,.08);border-left:2px solid var(--ac)}
.pnm{font-size:18px;font-weight:500}
.psb{font-size:16px;color:var(--t2);margin-top:1px}
.pst{text-align:right;font-size:17px}
.psc{font-weight:600;color:var(--gr)}
.pstot{color:var(--t2)}

/* Master items */
.mgrp{display:flex;align-items:center;justify-content:space-between;padding:5px 11px;background:var(--bg3);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
.mgn{font-size:16px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.mgc{display:flex;align-items:center;gap:5px;font-size:16px;color:var(--t2);cursor:pointer}
.mcard{padding:10px 11px;border-bottom:1px solid var(--bd2);display:flex;align-items:flex-start;gap:9px;transition:background .1s;cursor:pointer}
.mcard:last-child{border-bottom:none}
.mcard:hover{background:rgba(255,255,255,.02)}
.mcard.msel{background:rgba(63,185,80,.05)}
.mchk{width:15px;height:15px;accent-color:var(--gr);flex-shrink:0;margin-top:2px;cursor:pointer}
.mb{flex:1;min-width:0}
.mt{font-size:18px;font-weight:500;margin-bottom:2px;word-break:keep-all}
.mc2{font-size:16px;color:var(--t2);line-height:1.4;margin-bottom:3px;word-break:keep-all}
.mm{display:flex;gap:4px;flex-wrap:wrap}

/* Selected items */
.sitem{border-bottom:1px solid var(--bd2)}
.sitem:last-child{border-bottom:none}
.sih{padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}
.sih:hover{background:rgba(255,255,255,.02)}
.sin{width:18px;height:18px;border-radius:50%;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--ac);flex-shrink:0;font-family:'JetBrains Mono',monospace}
.sit{font-size:18px;font-weight:500;flex:1;word-break:keep-all}
.stog{font-size:17px;color:var(--t2);transition:transform .2s;display:inline-block}
.sib{padding:0 12px 12px;border-top:1px solid var(--bd2);background:rgba(88,166,255,.03)}
.sf{margin-top:8px}
.sfl{font-size:15px;font-weight:600;color:var(--t3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.sfin{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:17px;font-family:inherit;outline:none;transition:border-color .15s}
.sfin:focus{border-color:var(--ac)}
.sfta{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:17px;font-family:inherit;outline:none;resize:vertical;min-height:50px;transition:border-color .15s}
.sfta:focus{border-color:var(--ac)}
.sfrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.drow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}
.dl{font-size:15px;color:var(--t3);margin-bottom:2px}
.rmv{padding:2px 7px;border-radius:4px;border:1px solid rgba(248,81,73,.3);background:rgba(248,81,73,.08);color:var(--re);font-size:16px;cursor:pointer;font-family:inherit;transition:all .15s}
.rmv:hover{background:rgba(248,81,73,.2)}
.sempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;color:var(--t2)}
.sempty p{font-size:17px}
.edit-hint{color:var(--ac);font-size:15px}

/* ── Master DB: 검색바 상단 고정, 테이블 스크롤 ─── */
.m-sticky-hdr{
  position:sticky;
  top:62px;
  z-index:100;
  background:var(--bg);
  padding-bottom:12px;
}
.m-scroll-body{
  overflow-y:auto;
  max-height:calc(100vh - 340px);
  min-height:300px;
}
.m-scroll-body .tw{border:none;border-radius:0}
.m-scroll-body .tbl thead tr{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg3);
  box-shadow:0 1px 0 var(--bd);
}

/* Save bar */
.savebar{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:11px 16px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
#saveStats{display:flex;gap:14px;font-size:18px;color:var(--t2)}
#saveStats b{color:var(--tx)}

/* COMPANY */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.ccard{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:16px;transition:all .2s}
.ccard:hover{border-color:var(--ac);transform:translateY(-1px)}
.cnm{font-size:19px;font-weight:600;margin-bottom:4px}
.cmt{font-size:16px;color:var(--t2)}
.cst{margin-top:11px;display:flex;gap:11px}
.csv{font-size:23px;font-weight:700;font-family:'JetBrains Mono',monospace}
.csl{font-size:15px;color:var(--t2)}
.cnote{margin-top:7px;font-size:16px;color:var(--t3)}

@media(max-width:1100px){.s3col { display:grid; grid-template-columns:220px 1fr 1fr; gap:18px; flex:1 1 0; min-height:0; }}
@media(max-width:800px){.s3col { display:grid; grid-template-columns:220px 1fr 1fr; gap:18px; flex:1 1 0; min-height:0; }.sg4{grid-template-columns:repeat(2,1fr)}.cgrid{grid-template-columns:1fr}}

/* ══════════════════════════════════════════════════

/* 햄버거 버튼 */
.hbg-btn {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  flex-shrink: 0;
}
.hbg-btn span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--t2);
  border-radius: 2px;
  transition: all .25s;
}
.hbg-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hbg-btn.open span:nth-child(2) { opacity: 0; }
.hbg-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

/* 모바일 드로어 오버레이 */
.mob-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 190;
}
.mob-overlay.show { display: block; }

/* 모바일 사이드 드로어 */
.mob-drawer {
  position: fixed;
  top: 0;
  left: -100%;
  width: 260px;
  height: 100%;
  background: var(--bg2);
  border-right: 1px solid var(--bd);
  z-index: 195;
  transition: left .25s ease;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.mob-drawer.open { left: 0; }
.mob-drawer-hdr {
  padding: 18px 16px 14px;

  display: flex;
  align-items: center;
  gap: 10px;
}
.mob-drawer-hdr .ico2 {
  width: 28px; height: 28px;
  background: linear-gradient(135deg,var(--a2),var(--g2));

  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.mob-drawer-hdr span { font-weight: 700; font-size: 17px; }
.mob-nav {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}
.mob-nb {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 12px 14px;

  font-weight: 500;

.mob-nb.active { background: rgba(88,166,255,.12); color: var(--ac); }
.mob-drawer-ftr {

.mob-user {

  margin-bottom: 8px;
}
.mob-user .udot2 {
  width: 7px; height: 7px;
  border-radius: 50%;

}
.mob-user-info { flex: 1; min-width: 0; }
.mob-user-nm { font-size: 15px; font-weight: 600; }
.mob-user-rl { font-size: 13px; color: var(--t2); }
.mob-logout {

  .pr-ss { font-size: 13px; line-height: 1.2; }

  .pr-stat-lbl { font-size: 12px; }

  /* Setup 3컬럼 → 1컬럼 */
  .s3col { display: flex; flex-direction: column; gap: 0; }
  .spanel { min-height: 200px; max-height: 45vh; }

  /* 모달 */
  .mdl { width: 96vw !important; max-height: 90vh; }
  .mhdr h3 { font-size: 16px; }
  .mbdy { padding: 14px; }
  .mftr { padding: 10px 14px; }
  .frow { grid-template-columns: 1fr; gap: 8px; }
  .frow.s1 { grid-template-columns: 1fr; }
  .flbl { font-size: 12px; }

  /* 버튼 */
  .btn { font-size: 14px; padding: 7px 12px; }

  /* 페이지 헤더 */
  .ph { flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 14px; }
  .pt { font-size: 19px; }
  .ps { font-size: 13px; }

  /* 편집 버튼 */

  /* Master DB 스크롤 높이 */
  .m-scroll-body { max-height: calc(100vh - 300px); }

  /* 토스트 위치 */
  #tw { right: 8px; top: 58px; }

}

@media(max-width:400px) {
  .sg4 { grid-template-columns: 1fr 1fr; }
  .pr-step { flex: 0 0 calc(33.33% - 1px); }

/* ══ 공통: 페이지 고정 헤더 + 스크롤 바디 ══════════ */
#pg_master, #pg_setup, #pg_progress {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 110px);  /* 전체높이 - 헤더62px - main상하패딩48px */

}
/* 고정 헤더: 타이틀/스텝바/검색바 */
.pg-hdr {
  flex-shrink: 0;               /* 절대 줄어들지 않음 */
  background: var(--bg);
  padding-bottom: 8px;
}
/* 스크롤 바디: 남은 공간 전부 차지 + 세로 스크롤 */
.pg-body {

  min-height: 0;
  display: flex;
  flex-direction: column;
}
/* Master DB 테이블 래퍼 */
.mTblWrap {

  flex: 1 1 0;
  min-height: 0;
  overflow: hidden;
  display: flex;

}

/* 테이블 thead 고정 */
.mTblWrap .tw .tbl thead tr {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg3);
  box-shadow: 0 1px 0 var(--bd);
}
/* 진행현황 */
#prStat { flex-shrink: 0; padding: 4px 0 12px; }
#prBody { flex: 1 1 0; overflow-y: auto; min-height: 0; padding: 2px 0 24px; }
/* Setup s3col */
.s3col {
  flex: 1 1 0;
  min-height: 0;
}
/* 편집 버튼 스타일 */
.editBtn {
  width: 36px;
  height: 32px;
  border: 1px solid var(--bd);
  border-radius: 6px;
  background: var(--bg3);

}
/* pg_master가 flex일 때 main 패딩 조정 */
#pg_master.visible .main {
  overflow: hidden;
}


/* prBody thead: step-hdr 방식으로 대체됨 */
#prCont .tw {
  overflow-x: auto;
  overflow-y: visible;
}
/* prStat: 통계카드 고정 영역 */
#prStat {
  padding: 0 0 10px 0;
}

/* ── 진행현황 단계별 레이아웃 ──────────────────────── */
.step-block {
  margin-bottom: 16px;
  border: 1px solid var(--bd);
  border-radius: 10px;
  overflow: visible;
  background: var(--bg2);
}
/* 단계 헤더: 단계명 + 진행바 + 컬럼헤더 → 고정 */
.step-hdr {
  padding: 14px 16px 0;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--bd);
  border-radius: 10px 10px 0 0;
}
/* thead 용 테이블: 레이아웃 공유를 위해 tbody 테이블과 같은 컬럼 */
.step-thead-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin-top: 8px;
}
.step-thead-tbl th {
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--t2);
  font-size: 15px;
  white-space: nowrap;
  border-right: 1px solid var(--bd2);
  background: var(--bg3);
}
.step-thead-tbl th:last-child { border-right: none; }
/* 바디: tbody 만 스크롤 */
.step-body {
  overflow-y: auto;
  max-height: 400px;
  border-radius: 0 0 10px 10px;
}
.step-body-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.step-body-tbl td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--bd2);
  border-right: 1px solid var(--bd2);
  vertical-align: middle;
  font-size: 15px;
}
.step-body-tbl td:last-child { border-right: none; }
.step-body-tbl tr:last-child td { border-bottom: none; }
.step-body-tbl tr { transition: background .1s; }
.step-body-tbl tr:hover { background: var(--bg3); }


/* ══ 진행현황 새 스텝바 ══════════════════════════════ */
.pr-stepbar {
  display: flex;
  gap: 0;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 6px;
}
.pr-step {
  flex: 1;
  padding: 18px 8px 16px;
  text-align: center;
  cursor: pointer;
  border-right: 1px solid var(--bd);
  transition: all .15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
}
.pr-step:last-child { border-right: none; }
.pr-step:hover { background: var(--bg3); }
.pr-step.pr-active {
  background: rgba(88,166,255,.1);
  border-bottom: 3px solid var(--ac);
}
.pr-step-empty { opacity: .4; cursor: default; }
.pr-step-empty:hover { background: transparent; }
.pr-se { font-size: 28px; line-height: 1; }
.pr-ss { font-size: 20px; font-weight: 600; color: var(--t2); word-break: keep-all; line-height: 1.3; }
.pr-step.pr-active .pr-ss { color: var(--ac); }
.pr-sc { font-size: 19px; color: var(--t2); font-family: 'JetBrains Mono', monospace; }
.pr-pbar {
  width: 80%;
  height: 6px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.pr-pfill {
  height: 100%;
  background: linear-gradient(90deg, var(--g2), var(--gr));
  border-radius: 2px;
  transition: width .4s ease;
}
.pr-pct {
  font-size: 23px;
  font-weight: 700;
  color: var(--t2);
  font-family: 'JetBrains Mono', monospace;
}
.pr-pct.pr-done { color: var(--gr); }
.pr-step.pr-active .pr-pct { color: var(--ac); }

/* ══ 진행현황 항목 영역 ══════════════════════════════ */
.pr-items-hdr {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 10px 10px 0 0;
  padding: 16px 18px 14px;
  border-bottom: none;
  position: sticky;
  top: 0;
  z-index: 20;
}
.pr-tbl-wrap {
  border: 1px solid var(--bd);
  border-radius: 0 0 10px 10px;
  overflow: hidden;
}
.pr-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.pr-tbl thead tr {
  background: var(--bg3);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pr-tbl th {
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--t2);
  font-size: 14px;
  border-right: 1px solid var(--bd2);
  white-space: nowrap;
}
.pr-tbl th:last-child { border-right: none; }
.pr-tbl tbody tr { border-bottom: 1px solid var(--bd2); transition: background .1s; }
.pr-tbl tbody tr:last-child { border-bottom: none; }
.pr-tbl tbody tr:hover { background: var(--bg3); }
.pr-tbl td {
  padding: 10px 12px;
  border-right: 1px solid var(--bd2);
  vertical-align: middle;
  font-size: 15px;
}
.pr-tbl td:last-child { border-right: none; }
.pr-done-row { opacity: .6; }
.pr-done-row td:nth-child(2) { text-decoration: line-through; color: var(--t2); }
.pr-chk {
  width: 18px; height: 18px;
  accent-color: var(--gr);
  cursor: pointer;
}


/* ── 진행현황 통계 (compact 가로형) ────────────────── */
.pr-stat-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}
.pr-stat-card {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 9px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.pr-stat-lbl {
  font-size: 14px;
  color: var(--t2);
  font-weight: 500;
  white-space: nowrap;
}
.pr-stat-val {
  font-size: 24px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}

function gid(id) { return document.getElementById(id); }

function lsGet(k) {
  try { var v = localStorage.getItem('epms_' + k); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function lsSet(k, v) {
  try { localStorage.setItem('epms_' + k, JSON.stringify(v)); } catch(e) {}
}
function saveAll() {
  lsSet('companies', state.companies);

}

function xe(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function hlQ(txt, q) {
  var s = xe(txt);
  if (!q) return s;
  return s.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'), '<mark class="hl">$1</mark>');
}

function bdg(req) {
  var cls = { '필수':'br', '선택':'bo', '조건부 필수':'bc', '권장':'bw' };
  return '<span class="b ' + (cls[req] || 'bo') + '">' + xe(req || '-') + '</span>';
}

function toast(title, msg, type) {
  var icons = { success:'✅', error:'❌', info:'ℹ️' };
  var el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.innerHTML = '<span style="font-size:19px">' + (icons[type] || 'ℹ️') + '</span>'
    + '<div><b style="font-size:18px">' + xe(title) + '</b>'
    + '<div style="font-size:17px;color:var(--t2)">' + xe(msg) + '</div></div>';
  gid('tw').appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

/* ── AUTH ───────────────────────────────────────────── */
function doLogin() {
  var id = gid('loginId').value.trim();
  var pw = gid('loginPw').value;
  if (USERS[id] && USERS[id].pw === pw) {
    state.curUser = { id: id, name: USERS[id].name, role: USERS[id].role };
    gid('loginScreen').style.display = 'none';

    gid('uRl').textContent = state.curUser.role;

/* ── INIT ───────────────────────────────────────────── */
function appInit() {
  var saved = lsGet('master');
  if (saved && saved.length) {
    state.master = saved;
  } else {
    state.master = MASTER_DB.map(function(r, i) {
      return Object.assign({}, r, { id: r.id || (i + 1) });
    });
  }
  state.companies = lsGet('companies') || [
    { id:'co1', name:'UTI (유티아이)',  industry:'디스플레이', note:'파일럿 기업', cd:'2026-04-01' },
    { id:'co2', name:'테스트기업 A',    industry:'반도체',     note:'',           cd:'2026-04-03' }
  ];
  state.setups = lsGet('setups') || {};
  if (!state.setups['co1']) {
    var ids = state.master.slice(0, 107).map(function(r){ return r.id; });
    state.setups['co1'] = { sel:ids, custom:{}, done:[], doneAt:{}, tgt:{} };
  }
  navTo('dashboard');
}

/* ── NAV ────────────────────────────────────────────── */
function adjustPageLayout(pgId) {
  // pg-hdr 실제 높이 측정 후 pg-body height 동적 조정
  requestAnimationFrame(function() {
    var pg   = gid(pgId);
    var hdr  = pg ? pg.querySelector('.pg-hdr') : null;
    var body = pg ? pg.querySelector('.pg-body') : null;
    if (!hdr || !body) return;
    var pgH  = pg.offsetHeight;
    var hdrH = hdr.offsetHeight;
    body.style.height = (pgH - hdrH - 8) + 'px';
  });
}

function navTo(p) {
  ['dashboard','master','setup','progress','company'].forEach(function(pg) {
    gid('pg_' + pg).style.display = (pg === p) ? 'block' : 'none';
  });
  document.querySelectorAll('.nb').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.nb[data-p="' + p + '"]');
  if (btn) btn.classList.add('active');
  // 모바일 드로어 active 동기화
  document.querySelectorAll('.mob-nb').forEach(function(b) { b.classList.remove('active'); });
  var mb = document.querySelector('.mob-nb[data-mp="' + p + '"]');
  if (mb) mb.classList.add('active');
  if      (p === 'dashboard') pgDash();
  else if (p === 'master')    pgMaster();
  else if (p === 'setup')     pgSetup();
  else if (p === 'progress')  pgProgress();
  else if (p === 'company')   pgCompany();
}

function mkProgStat(lbl, val, color) {
  return '<div class="pr-stat-card">'
    + '<div class="pr-stat-lbl">' + lbl + '</div>'

    + '</div>';
}

function mkStat(lbl, val, sub, color) {
  return '<div class="sc"><div class="sl">' + lbl + '</div><div class="sv" style="color:' + color + '">' + val + '</div><div class="ss">' + sub + '</div></div>';
}

function mkStepBars() {
  var max = 1;
  STEPS.forEach(function(s){ var c=state.master.filter(function(r){return r['프로세스']===s.key;}).length; if(c>max)max=c; });
  return STEPS.map(function(s){
    var c = state.master.filter(function(r){return r['프로세스']===s.key;}).length;
    var w = Math.round(c/max*100);
    return '<div class="brow"><span class="blbl">' + s.e + ' ' + s.s + '</span>'
      + '<div class="btrack"><div class="bfill" style="width:' + w + '%"></div>'
      + '<span class="bval">' + c + '</span></div></div>';
  }).join('');
}

function mkCoBars(tot) {
  if (!state.companies.length) return '<p style="color:var(--t2);padding:10px">등록된 기업이 없습니다</p>';
  return state.companies.map(function(c){
    var sel = ((state.setups[c.id]||{}).sel||[]).length;
    var pct = Math.round(sel/tot*100);
    return '<div style="margin-bottom:10px"><div class="flex-sb" style="margin-bottom:3px">'
      + '<span style="font-size:17px;font-weight:500">' + xe(c.name) + '</span>'
      + '<span style="font-size:16px;color:var(--t2)">' + sel + '개 (' + pct + '%)</span></div>'
      + '<div class="pb"><div class="pf" style="width:' + pct + '%"></div></div></div>';
  }).join('');
}

function mkReqBars(tot) {
  var types = ['필수','조건부 필수','선택','권장'];
  var colors = ['var(--gr)','var(--or)','var(--ac)','var(--pu)'];
  return types.map(function(t, i){
    var c = state.master.filter(function(r){return r['필수여부']===t;}).length;
    var pct = Math.round(c/tot*100);
    return '<div style="flex:1;min-width:140px"><div class="flex-sb" style="margin-bottom:3px">'
      + '<span style="font-size:17px;font-weight:500;color:' + colors[i] + '">' + t + '</span>'
      + '<span style="font-size:16px;color:var(--t2)">' + c + ' (' + pct + '%)</span></div>'
      + '<div class="pb"><div class="pf" style="width:' + pct + '%;background:' + colors[i] + '"></div></div></div>';
  }).join('');
}

function saveItem() {
  var id = gid('mId').value;
  var u = {
    '프로세스': gid('mProc').value, '구분': gid('mCat').value,
    '세부검토항목': gid('mTtl').value, '체크포인트': gid('mChk').value,
    '필수여부': gid('mReq').value,  '표준일정': gid('mSch').value,
    '필요문서': gid('mDoc').value,  '총괄담당부서': gid('mD1').value,
    '합의부서': gid('mD2').value,   '승인부서': gid('mD3').value
  };
  if (!u['세부검토항목']) { toast('오류','항목명은 필수입니다.','error'); return; }
  if (id) {
    var idx = -1;
    state.master.forEach(function(r,i){ if(r.id===parseInt(id)) idx=i; });
    if (idx >= 0) state.master[idx] = Object.assign({}, state.master[idx], u);
    toast('저장','항목이 수정되었습니다.','success');
  } else {
    var mx = 0; state.master.forEach(function(r){ if(r.id>mx) mx=r.id; });
    state.master.push(Object.assign({}, u, { id: mx+1 }));
    toast('추가','새 항목이 추가되었습니다.','success');
  }
  saveAll(); CM('itemModal'); renderMTbl();
}

  state.master = state.master.filter(function(r){ return r.id !== id; });

}

  var s   = state.setups[coId] || {};
  var cnt = (s.sel||[]).length;
  gid('siBadge').innerHTML = cnt ? '<span class="info-badge">✅ ' + cnt + '개 선택됨</span>' : '';
  if (gid('siTot')) gid('siTot').textContent = cnt + '개';
  if (gid('sSelCnt')) gid('sSelCnt').textContent = cnt + '개';
}

function renderSProc(coId) {
  var sel = {};
  ((state.setups[coId]||{}).sel||[]).forEach(function(id){ sel[id] = true; });
  gid('sProcList').innerHTML = STEPS.map(function(s, i){
    var items = state.master.filter(function(r){ return r['프로세스'] === s.key; });
    var sc    = items.filter(function(r){ return sel[r.id]; }).length;
    var cls   = state.setupStep === i ? ' active' : '';
    return '<div class="pi' + cls + '" onclick="selSStep(\'' + coId + '\',' + i + ')">'
      + '<div><div class="pnm">' + s.e + ' ' + s.s + '</div>'
      + '<div class="psb">' + items.length + '개 항목</div></div>'
      + '<div class="pst"><div class="psc">' + sc + '</div>'
      + '<div class="pstot">/ ' + items.length + '</div></div>'
      + '</div>';
  }).join('');
}

function selSStep(coId, i) {
  state.setupStep = i;
  renderSProc(coId);
  renderSMast();
}

function renderSMast() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var sel  = {};
  ((state.setups[coId]||{}).sel||[]).forEach(function(id){ sel[id] = true; });
  var q    = gid('sMSrch') ? gid('sMSrch').value.toLowerCase() : '';
  var step = STEPS[state.setupStep];
  if (gid('sMastTitle')) gid('sMastTitle').textContent = step.e + ' ' + step.key;
  var all   = state.master.filter(function(r){ return r['프로세스'] === step.key; });
  var selC  = all.filter(function(r){ return sel[r.id]; }).length;
  var items = q ? all.filter(function(r){
    return (r['세부검토항목']||'').toLowerCase().indexOf(q)>=0 || (r['체크포인트']||'').toLowerCase().indexOf(q)>=0;
  }) : all;

  if (gid('sMSrch')) gid('sMSrch').disabled = false;
  if (gid('sMastBtns')) gid('sMastBtns').innerHTML =
    '<button class="btn bxs bs" onclick="selAll(true)">전체</button>'
    + '<button class="btn bxs bs" onclick="selAll(false)">해제</button>'
    + '<button class="btn bxs bw" onclick="selReq()">필수만</button>';

  // 그룹별
  var groups = {}, gOrder = [];
  items.forEach(function(r){
    var g = r['구분'] || '기타';
    if (!groups[g]) { groups[g] = []; gOrder.push(g); }
    groups[g].push(r);
  });

  if (!items.length) { gid('sMastBody').innerHTML = '<div class="sempty"><div class="ei">🔍</div><p>검색 결과 없음</p></div>'; return; }

  var html = '';
  gOrder.forEach(function(g){
    var gi  = groups[g];
    var gsc = gi.filter(function(r){ return sel[r.id]; }).length;
    var chk = gsc === gi.length ? ' checked' : '';
    html += '<div class="mgrp">'
      + '<span class="mgn">' + xe(g) + '</span>'
      + '<label class="mgc"><input type="checkbox"' + chk
      + ' onchange="grpChk(this,\'' + coId + '\',\'' + g.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')"'
      + '> <span>' + gsc + '/' + gi.length + '</span></label></div>';
    gi.forEach(function(r){
      var isSel = !!sel[r.id];
      html += '<div class="mcard' + (isSel?' msel':'') + '" id="mc' + r.id + '">'
        + '<input type="checkbox" class="mchk"' + (isSel?' checked':'')
        + ' onchange="togItem(\'' + coId + '\',' + r.id + ',this.checked)">'
        + '<div class="mb">'
        + '<div class="mt">' + hlQ(r['세부검토항목'], q) + '</div>'
        + '<div class="mc2">' + hlQ(r['체크포인트'], q) + '</div>'
        + '<div class="mm">' + bdg(r['필수여부']) + (r['표준일정']?'<span class="chip">⏱ '+xe(r['표준일정'])+'</span>':'') + '</div>'
        + '</div></div>';
    });
  });
  gid('sMastBody').innerHTML = html;
  updStats(coId);
}

function renderSSel() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var s    = state.setups[coId] || {};
  var sel  = new Set(s.sel || []);
  var cust = s.custom || {};
  var tgt  = s.tgt || {};
  var key  = STEPS[state.setupStep].key;
  var items = state.master.filter(function(r){ return r['프로세스']===key && sel.has(r.id); });

  if (gid('sSelCnt')) gid('sSelCnt').textContent = (s.sel||[]).length + '개 (이 단계:' + items.length + ')';
  if (!items.length) {
    gid('sSelBody').innerHTML = '<div class="sempty"><div class="ei">📝</div><p>가운데에서 항목을 체크하세요</p></div>';
    return;
  }

  gid('sSelBody').innerHTML = items.map(function(r, idx){
    var c  = cust[r.id] || {};
    var d1 = c['총괄담당부서'] !== undefined ? c['총괄담당부서'] : r['총괄담당부서']||'';
    var d2 = c['합의부서']     !== undefined ? c['합의부서']     : r['합의부서']||'';
    var d3 = c['승인부서']     !== undefined ? c['승인부서']     : r['승인부서']||'';
    var cp = c['체크포인트']   !== undefined ? c['체크포인트']   : r['체크포인트']||'';
    var dc = c['필요문서']     !== undefined ? c['필요문서']     : r['필요문서']||'';
    var rq = c['필수여부']     !== undefined ? c['필수여부']     : r['필수여부']||'필수';
    var tg = tgt[r.id] || '';

    return '<div class="sitem">'
      + '<div class="sih" onclick="togSEl(' + r.id + ')">'
      + '<span class="sin">' + (idx+1) + '</span>'
      + '<span class="sit">' + xe(r['세부검토항목']) + '</span>'
      + '<div class="flex-g">' + bdg(rq) + '<span class="stog" id="stog' + r.id + '">▶</span></div>'
      + '</div>'
      + '<div class="sib" id="sib' + r.id + '" style="display:none">'
      + '<div class="sf"><div class="sfl">체크 포인트 <span class="edit-hint">(수정가능)</span></div>'
      + '<textarea class="sfta" onchange="updC(\'' + coId + '\',' + r.id + ',\'체크포인트\',this.value)">' + xe(cp) + '</textarea></div>'
      + '<div class="sfrow">'
      + '<div class="sf"><div class="sfl">필수여부</div>'
      + '<select class="sfin" onchange="updC(\'' + coId + '\',' + r.id + ',\'필수여부\',this.value)">'
      + ['필수','조건부 필수','선택','권장'].map(function(v){ return '<option' + (rq===v?' selected':'') + '>' + v + '</option>'; }).join('')
      + '</select></div>'
      + '<div class="sf"><div class="sfl">목표일정</div>'
      + '<input class="sfin" placeholder="2026-05-01" value="' + xe(tg) + '" onchange="updT(\'' + coId + '\',' + r.id + ',this.value)"></div>'
      + '</div>'
      + '<div class="sf"><div class="sfl">필요문서 <span class="edit-hint">(수정가능)</span></div>'
      + '<input class="sfin" value="' + xe(dc) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'필요문서\',this.value)"></div>'
      + '<div class="sf"><div class="sfl">📌 담당 부서 <span class="edit-hint" style="color:var(--or)">(기업 맞춤 수정)</span></div>'
      + '<div class="drow">'
      + '<div><div class="dl">총괄담당</div><input class="sfin" value="' + xe(d1) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'총괄담당부서\',this.value)"></div>'
      + '<div><div class="dl">합의부서</div><input class="sfin" value="' + xe(d2) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'합의부서\',this.value)"></div>'
      + '<div><div class="dl">승인부서</div><input class="sfin" value="' + xe(d3) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'승인부서\',this.value)"></div>'
      + '</div></div>'
      + '<div style="margin-top:8px;text-align:right">'
      + '<button class="rmv" onclick="rmvItem(\'' + coId + '\',' + r.id + ')">✕ 선택 해제</button>'
      + '</div></div></div>';
  }).join('');
}

function togSEl(id) {
  var b = gid('sib' + id), t = gid('stog' + id);
  if (!b) return;
  var open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  if (t) t.style.transform = open ? '' : 'rotate(90deg)';
}

function updC(coId, id, field, val) {
  var s = state.setups[coId];
  if (!s.custom) s.custom = {};
  if (!s.custom[id]) s.custom[id] = {};
  s.custom[id][field] = val;
}
function updT(coId, id, val) {
  var s = state.setups[coId];
  if (!s.tgt) s.tgt = {};
  s.tgt[id] = val;
}

function rmvItem(coId, id) {
  var s = state.setups[coId];
  s.sel = s.sel.filter(function(x){ return x !== id; });
  if (s.custom) delete s.custom[id];
  updBadge(coId); renderSProc(coId); renderSMast(); renderSSel(); updStats(coId);
}

function togItem(coId, id, checked) {
  var s = state.setups[coId];
  if (checked) { if (s.sel.indexOf(id) < 0) s.sel.push(id); }
  else { s.sel = s.sel.filter(function(x){ return x !== id; }); if(s.custom) delete s.custom[id]; }
  var card = gid('mc' + id);
  if (card) { checked ? card.classList.add('msel') : card.classList.remove('msel'); }
  updBadge(coId); renderSProc(coId); renderSSel(); updStats(coId);
}

function grpChk(input, coId, g) {
  var items = state.master.filter(function(r){ return r['프로세스']===STEPS[state.setupStep].key && (r['구분']||'기타')===g; });
  var s = state.setups[coId];
  items.forEach(function(r){
    if (input.checked) { if (s.sel.indexOf(r.id)<0) s.sel.push(r.id); }
    else { s.sel = s.sel.filter(function(x){return x!==r.id;}); if(s.custom) delete s.custom[r.id]; }
  });
  updBadge(coId); renderSProc(coId); renderSMast(); renderSSel(); updStats(coId);
}

function selAll(checked) {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var items = state.master.filter(function(r){ return r['프로세스']===STEPS[state.setupStep].key; });
  var s = state.setups[coId];
  if (checked) { items.forEach(function(r){ if(s.sel.indexOf(r.id)<0) s.sel.push(r.id); }); }
  else {
    var ids = {}; items.forEach(function(r){ ids[r.id]=true; });
    s.sel = s.sel.filter(function(x){ return !ids[x]; });
    if (s.custom) items.forEach(function(r){ delete s.custom[r.id]; });
  }
  updBadge(coId); renderSProc(coId); renderSMast(); renderSSel(); updStats(coId);
}

function selReq() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var items = state.master.filter(function(r){ return r['프로세스']===STEPS[state.setupStep].key; });
  var s = state.setups[coId];
  var ids = {}; items.forEach(function(r){ ids[r.id]=true; });
  s.sel = s.sel.filter(function(x){ return !ids[x]; });
  items.filter(function(r){ return r['필수여부']==='필수'; }).forEach(function(r){ s.sel.push(r.id); });
  updBadge(coId); renderSProc(coId); renderSMast(); renderSSel(); updStats(coId);
}

function updStats(coId) {
  var s = state.setups[coId] || {};
  var tot = (s.sel||[]).length;
  var req = state.master.filter(function(r){ return (s.sel||[]).indexOf(r.id)>=0 && r['필수여부']==='필수'; }).length;
  var si  = state.master.filter(function(r){ return r['프로세스']===STEPS[state.setupStep].key; });
  var siS = si.filter(function(r){ return (s.sel||[]).indexOf(r.id)>=0; }).length;
  if (gid('saveStats')) gid('saveStats').innerHTML =
    '<span>이 단계: <b>' + siS + '/' + si.length + '</b></span>'
    + '<span>전체: <b>' + tot + '개</b></span>'
    + '<span>필수: <b>' + req + '개</b></span>';
}

function saveStp() {
  saveAll();
  toast('저장 완료','프로세스 Setup이 저장되었습니다.','success');
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (coId) { renderSProc(coId); updBadge(coId); updStats(coId); }
}

/* ── PROGRESS PAGE ──────────────────────────────────── */
function pgProgress() {
  var opts = state.companies.map(function(c){
    return '<option value="' + xe(c.id) + '">' + xe(c.name) + '</option>';
  }).join('');
  gid('pg_progress').innerHTML =
    '<div class="pg-hdr">'
    + '<div class="ph"><div><h1 class="pt">📈 진행 현황</h1>'
    + '<p class="ps">기업별 프로세스 진행 추적</p></div>'
    + '<select class="fsel" id="prCoSel" onchange="loadProg()">'
    + '<option value="">— 기업을 선택하세요 —</option>' + opts
    + '</select></div>'
    + '<div id="prStat"></div>'
    + '<div id="prStepBar"></div>'
    + '</div>'
    + '<div class="pg-body"><div id="prBody">'
    + '<div class="empty"><div class="ei">📈</div><h3>기업을 선택하세요</h3></div>'
    + '</div></div>';
  adjustPageLayout('pg_progress');
}


function loadProg() {
  var coId = gid('prCoSel') ? gid('prCoSel').value : '';
  if (!coId) {
    gid('prStat').innerHTML = '';
    gid('prStepBar').innerHTML = '';
    gid('prBody').innerHTML = '<div class="empty"><div class="ei">📈</div><h3>기업을 선택하세요</h3></div>';
    return;
  }
  var s = state.setups[coId];
  if (!s || !s.sel || !s.sel.length) {
    gid('prStat').innerHTML = '';
    gid('prStepBar').innerHTML = '';
    gid('prBody').innerHTML = '<div class="empty"><div class="ei">⚙️</div><h3>Setup을 먼저 완료하세요</h3></div>';
    return;
  }
  if (!state.progressStep) state.progressStep = 0;
  renderProgStat(coId);
  renderProgStepBar(coId);
  renderProgItems(coId);
  adjustPageLayout('pg_progress');
}

function renderProgStat(coId) {
  var s   = state.setups[coId];
  var sel = new Set(s.sel||[]);
  var done= new Set(s.done||[]);
  var tot = sel.size, comp = done.size;
  var pct = tot ? Math.round(comp/tot*100) : 0;
  gid('prStat').innerHTML =
    '<div class="pr-stat-row">'
    + mkProgStat('📋 전체 항목', tot, 'var(--ac)')
    + mkProgStat('✅ 완료', comp, 'var(--gr)')
    + mkProgStat('⏳ 미완료', tot-comp, 'var(--or)')
    + mkProgStat('📊 전체 진행률', pct+'%', 'var(--pu)')
    + '</div>';
}

function renderProgStepBar(coId) {
  var s    = state.setups[coId];
  var sel  = new Set(s.sel||[]);
  var done = new Set(s.done||[]);
  var html = '<div class="pr-stepbar" id="prStepBarInner">';
  STEPS.forEach(function(step, i){
    var items = state.master.filter(function(r){ return r['프로세스']===step.key && sel.has(r.id); });
    var isActive = (state.progressStep||0) === i;
    if (!items.length) {
      html += '<div class="pr-step pr-step-empty" data-coId="' + xe(coId) + '" data-i="' + i + '">'
        + '<span class="pr-se">' + step.e + '</span>'
        + '<span class="pr-ss">' + step.s + '</span>'
        + '<span class="pr-sc t3">-</span>'
        + '</div>';
      return;
    }
    var sc  = items.filter(function(r){ return done.has(r.id); }).length;
    var pct = Math.round(sc/items.length*100);
    html += '<div class="pr-step' + (isActive?' pr-active':'') + '" data-coId="' + xe(coId) + '" data-i="' + i + '">'
      + '<span class="pr-se">' + step.e + '</span>'
      + '<span class="pr-ss">' + step.s + '</span>'
      + '<span class="pr-sc">' + sc + '/' + items.length + '</span>'
      + '<div class="pr-pbar"><div class="pr-pfill" style="width:' + pct + '%"></div></div>'
      + '<span class="pr-pct' + (pct===100?' pr-done':'') + '">' + pct + '%</span>'
      + '</div>';
  });
  html += '</div>';
  gid('prStepBar').innerHTML = html;
  // 이벤트 위임: 클릭 처리
  gid('prStepBar').addEventListener('click', function(e){
    var el = e.target.closest('.pr-step');
    if (!el || el.classList.contains('pr-step-empty')) return;
    var ci = el.dataset.coid || el.dataset.coId;
    var idx = parseInt(el.dataset.i);
    selProgStep(ci, idx);
  });
}


function selProgStep(coId, i) {
  state.progressStep = i;
  renderProgStepBar(coId);
  renderProgItems(coId);
}

function renderProgItems(coId) {
  var s     = state.setups[coId];
  var sel   = new Set(s.sel||[]);
  var done  = new Set(s.done||[]);
  var canE  = canEdit();
  var step  = STEPS[state.progressStep||0];
  var items = state.master.filter(function(r){ return r['프로세스']===step.key && sel.has(r.id); });

  if (!items.length) {
    gid('prBody').innerHTML = '<div class="empty" style="margin-top:30px">'
      + '<div class="ei">📭</div><h3>이 단계에 Setup된 항목이 없습니다</h3>'
      + '<p>프로세스 Setup에서 항목을 선택하세요</p></div>';
    return;
  }

  var sc  = items.filter(function(r){ return done.has(r.id); }).length;
  var pct = Math.round(sc/items.length*100);

  var html = '<div class="pr-items-hdr">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    + '<b style="font-size:18px">' + step.e + ' ' + step.s + '</b>'
    + '<span class="t2 sm">' + sc + '/' + items.length + '개 완료</span>'
    + (pct===100 ? '<span class="b br" style="margin-left:4px">✅ 완료</span>' : '')
    + '</div>'
    + '<div class="pb" style="height:7px;margin-bottom:0">'
    + '<div class="pf" style="width:' + pct + '%"></div></div>'
    + '</div>'
    + '<div class="pr-tbl-wrap">'
    + '<table class="pr-tbl"><thead><tr>'
    + '<th style="width:50px">완료</th>'
    + '<th style="width:22%">세부 검토 항목</th>'
    + '<th style="width:30%">체크 포인트</th>'
    + '<th style="width:80px">필수여부</th>'
    + '<th style="width:13%">담당부서</th>'
    + '<th style="width:11%">필요문서</th>'
    + '<th style="width:10%">목표일정</th>'
    + '<th style="width:12%">완료일시</th>'
    + '</tr></thead><tbody>';

  items.forEach(function(r){
    var isDone = done.has(r.id);
    var c  = (s.custom||{})[r.id] || {};
    var dp = c['총괄담당부서'] !== undefined ? c['총괄담당부서'] : r['총괄담당부서']||'';
    var dc = c['필요문서']     !== undefined ? c['필요문서']     : r['필요문서']||'';
    var tg = (s.tgt||{})[r.id] || '';
    var da = (s.doneAt||{})[r.id] || '';
    var rq = c['필수여부']     !== undefined ? c['필수여부']     : r['필수여부'];
    var cp = c['체크포인트']   !== undefined ? c['체크포인트']   : r['체크포인트']||'';
    html += '<tr class="pr-row' + (isDone?' pr-done-row':'') + '">'
      + '<td style="text-align:center;vertical-align:middle">'
      + (canE
        ? '<input type="checkbox"' + (isDone?' checked':'') + ' class="pr-chk"'
          + ' data-coid="' + xe(coId) + '" data-id="' + r.id + '">'
        : (isDone ? '✅' : '⬜'))
      + '</td>'
      + '<td class="fw">' + xe(r['세부검토항목']) + '</td>'
      + '<td class="t2 sm">' + xe(cp) + '</td>'
      + '<td>' + bdg(rq) + '</td>'
      + '<td class="sm">' + xe(dp) + '</td>'
      + '<td class="t2 sm">' + xe(dc) + '</td>'
      + '<td class="t2 sm">' + xe(tg) + '</td>'
      + '<td class="t3 sm">' + xe(da) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  gid('prBody').innerHTML = html;

  // 체크박스 이벤트 위임
  gid('prBody').addEventListener('change', function(e){
    var inp = e.target;
    if (!inp || !inp.classList.contains('pr-chk')) return;
    var cid = inp.dataset.coid;
    var rid = parseInt(inp.dataset.id);
    togDone(cid, rid, inp.checked);
  });
}


function renderProg() { loadProg(); }

function togDone(coId, id, checked) {
  var s = state.setups[coId];
  if (!s.done)   s.done   = [];
  if (!s.doneAt) s.doneAt = {};
  if (checked) { if (s.done.indexOf(id)<0) s.done.push(id); s.doneAt[id] = new Date().toLocaleString('ko-KR'); }
  else { s.done = s.done.filter(function(x){return x!==id;}); delete s.doneAt[id]; }
  saveAll();
  renderProgStat(coId);
  renderProgStepBar(coId);
  renderProgItems(coId);
}


/* ── COMPANY PAGE ───────────────────────────────────── */
function pgCompany() {
  var canE = canEdit();
  var html = '<div class="ph"><div><h1 class="pt">🏢 기업 관리</h1><p class="ps">등록된 기업 현황</p></div>'
    + (canE ? '<button class="btn bp" onclick="openAddCo()">+ 기업 추가</button>' : '')
    + '</div><div class="cgrid">';
  state.companies.forEach(function(c){
    var s = state.setups[c.id] || {};
    var sel  = (s.sel||[]).length, done = (s.done||[]).length;
    var pct  = sel ? Math.round(done/sel*100) : 0;
    html += '<div class="ccard">'
      + '<div class="flex-sb">'
      + '<div><div class="cnm">' + xe(c.name) + '</div><div class="cmt">' + xe(c.industry||'-') + ' · ' + xe(c.cd||'') + '</div></div>'
      + (canE ? '<button class="btn bxs bd" onclick="delCo(\'' + c.id + '\')">🗑️</button>' : '')
      + '</div>'
      + '<div class="cst">'
      + '<div><div class="csv" style="color:var(--ac)">' + sel + '</div><div class="csl">Setup</div></div>'
      + '<div><div class="csv" style="color:var(--gr)">' + done + '</div><div class="csl">완료</div></div>'
      + '<div><div class="csv" style="color:var(--or)">' + pct + '%</div><div class="csl">진행률</div></div>'
      + '</div>'
      + '<div class="pb mt8"><div class="pf" style="width:' + pct + '%"></div></div>'
      + '<div class="flex-g mt10">'
      + '<button class="btn bp bsm" onclick="goSetup(\'' + c.id + '\')">⚙️ Setup</button>'
      + '<button class="btn bs bsm" onclick="goProg(\'' + c.id + '\')">📈 현황</button>'
      + '</div>'
      + (c.note ? '<div class="cnote">' + xe(c.note) + '</div>' : '')
      + '</div>';
  });
  if (!state.companies.length) html += '<div class="empty" style="grid-column:1/-1"><div class="ei">🏢</div><h3>등록된 기업이 없습니다</h3><p>오른쪽 상단 버튼으로 추가하세요</p></div>';
  html += '</div>';
  gid('pg_company').innerHTML = html;
}

function openAddCo() {
  if (!canEdit()) return;
  gid('coNm').value = ''; gid('coInd').value = ''; gid('coNote').value = '';
  gid('coModal').style.display = 'flex';
}
function addCo() {
  var nm = gid('coNm').value.trim();
  if (!nm) { toast('오류','기업명을 입력하세요.','error'); return; }
  var id = 'co' + Date.now();
  state.companies.push({ id:id, name:nm, industry:gid('coInd').value, note:gid('coNote').value, cd:new Date().toLocaleDateString('ko-KR') });
  saveAll(); CM('coModal'); pgCompany();
  toast('등록 완료', nm + ' 기업이 등록되었습니다.', 'success');
}
function delCo(id) {
  var c = state.companies.filter(function(x){ return x.id===id; })[0];
  if (!confirm('"' + c.name + '" 기업을 삭제하시겠습니까?')) return;
  state.companies = state.companies.filter(function(x){ return x.id!==id; });
  delete state.setups[id];
  saveAll(); pgCompany();
  toast('삭제','기업이 삭제되었습니다.','info');
}
function goSetup(coId) {
  navTo('setup');
  setTimeout(function(){ if(gid('coSel')){ gid('coSel').value = coId; loadCo(); } }, 60);
}
function goProg(coId) {
  navTo('progress');
  setTimeout(function(){ if(gid('prCoSel')){ gid('prCoSel').value = coId; state.progressStep=0; loadProg(); } }, 60);
}

/* ── EXPORT ─────────────────────────────────────────── */
function exportMaster() {
  var cols = ['id','프로세스','구분','세부검토항목','체크포인트','필수여부','필요문서','총괄담당부서','합의부서','승인부서','표준일정'];
  var rows = [cols.join(',')];
  state.master.forEach(function(r){
    rows.push(cols.map(function(k){ return '"' + String(r[k]||'').replace(/"/g,'""') + '"'; }).join(','));
  });
  dlCSV(rows.join('\n'), 'master_' + new Date().toISOString().slice(0,10) + '.csv');
}
function expSetup() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) { toast('오류','기업을 먼저 선택하세요.','error'); return; }
  var co = state.companies.filter(function(c){ return c.id===coId; })[0];
  var s  = state.setups[coId] || {};
  if (!(s.sel||[]).length) { toast('오류','선택된 항목이 없습니다.','error'); return; }
  var cols = ['프로세스','구분','세부검토항목','체크포인트','필수여부','필요문서','총괄담당부서','합의부서','승인부서','표준일정','목표일정'];
  var rows = [cols.join(',')];
  state.master.filter(function(r){ return (s.sel||[]).indexOf(r.id)>=0; }).forEach(function(r){
    var c = (s.custom||{})[r.id] || {};
    function cv(f){ return c[f]!==undefined ? c[f] : r[f]||''; }
    var vals = [r['프로세스'],r['구분'],r['세부검토항목'],cv('체크포인트'),cv('필수여부'),cv('필요문서'),cv('총괄담당부서'),cv('합의부서'),cv('승인부서'),r['표준일정']||'',(s.tgt||{})[r.id]||''];
    rows.push(vals.map(function(v){ return '"' + String(v||'').replace(/"/g,'""') + '"'; }).join(','));
  });
  dlCSV(rows.join('\n'), 'setup_' + co.name + '_' + new Date().toISOString().slice(0,10) + '.csv');
}
function dlCSV(data, fname) {
  var blob = new Blob(['\uFEFF' + data], { type:'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  toast('내보내기','CSV 파일 다운로드 중','success');
}

/* ── MODAL ──────────────────────────────────────────── */
function CM(id) { gid(id).style.display = 'none'; }

/* ── 모바일 드로어 ───────────────────────────────────── */
function toggleDrawer() {
  var drawer = gid('mobDrawer');
  var overlay = gid('mobOverlay');
  var btn = gid('hbgBtn');
  var isOpen = drawer.classList.contains('open');
  if (isOpen) {
    drawer.classList.remove('open');
    overlay.classList.remove('show');
    btn.classList.remove('open');
  } else {
    drawer.classList.add('open');
    overlay.classList.add('show');
    btn.classList.add('open');
  }
}
function closeDrawer() {
  var drawer = gid('mobDrawer');
  var overlay = gid('mobOverlay');
  var btn = gid('hbgBtn');
  drawer.classList.remove('open');
  overlay.classList.remove('show');
  if (btn) btn.classList.remove('open');
}
function mobNavTo(p) {
  closeDrawer();
  navTo(p);
  // 모바일 드로어 메뉴 active 상태 업데이트
  document.querySelectorAll('.mob-nb').forEach(function(b) { b.classList.remove('active'); });
  var mb = document.querySelector('.mob-nb[data-mp="' + p + '"]');
  if (mb) mb.classList.add('active');
}

/* ── EVENTS ─────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function(){
  // 창 크기 변경 시 레이아웃 재계산 + 드로어 닫기
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) closeDrawer();
    ['pg_master','pg_setup','pg_progress'].forEach(function(id) {
      var pg = document.getElementById(id);
      if (pg && pg.style.display !== 'none') adjustPageLayout(id);
    });
  });
  // ESC 키로 드로어 닫기
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDrawer();
  });
  gid('btnLogin').addEventListener('click', doLogin);
  gid('loginPw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  gid('loginId').addEventListener('keydown', function(e){ if(e.key==='Enter') gid('loginPw').focus(); });
  gid('itemModal').addEventListener('click', function(e){ if(e.target===this) CM('itemModal'); });
  gid('coModal').addEventListener('click',   function(e){ if(e.target===this) CM('coModal');   });
});

</script>
