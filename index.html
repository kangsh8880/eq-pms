<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EQ-PMS | 설비투자 프로세스 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme-dark.css">
<link rel="stylesheet" href="css/theme-light.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ── LOGIN ───────────────────────────────────── -->
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-ico">⚙️</div>
      <div><h1>EQ-PMS</h1><p>설비투자 프로세스 관리 시스템</p></div>
    </div>
    <h2 class="ltit">로그인</h2>
    <p class="lsub">계정 정보를 입력하세요</p>
    <div class="fg">
      <label>아이디</label>
      <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="username">
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="lbtn" id="btnLogin">로그인</button>
    <div class="lerr" id="loginErr">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div class="lhint" style="display:none">
      <strong>테스트 계정</strong><br>
      관리자: <strong>admin</strong> / <strong>admin1234</strong><br>
      일반: user / user1234 &nbsp;|&nbsp; 읽기전용: viewer / view1234
    </div>
  </div>
</div>

<!-- ── APP ─────────────────────────────────────── -->
<div id="app">
  <header class="hdr">
    <div class="hdr-logo"><div class="ico">⚙️</div><span>EQ-PMS</span></div>
    <nav class="hnav">
      <button class="nb" data-p="dashboard" onclick="navTo('dashboard')">📊 대시보드</button>
      <button class="nb" data-p="master"    onclick="navTo('master')">📋 Master DB</button>
      <button class="nb" data-p="setup"     onclick="navTo('setup')">⚙️ Setup</button>
      <button class="nb" data-p="progress"  onclick="navTo('progress')">📈 진행현황</button>
      <button class="nb" data-p="equip"     onclick="navTo('equip')">🏭 설비 진척</button>
      <button class="nb" data-p="detail"    onclick="navTo('detail')">📊 설비별 실적</button>
      <button class="nb" data-p="company"   onclick="navTo('company')">🏢 기업 관리</button>
    </nav>
    <div class="hr">
      <button id="themeToggleBtn" onclick="toggleTheme()" style="padding:4px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--bg3);cursor:pointer;font-size:16px;line-height:1" title="테마 전환">☀️</button>
      <div class="ubadge"><div class="udot"></div><span id="uNm">-</span><span class="urole" id="uRl">-</span></div>
      <button class="lout" onclick="doLogout()">로그아웃</button>
    </div>
    <button class="hbg-btn" id="hbgBtn" onclick="toggleDrawer()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </header>
  <div class="mob-overlay" id="mobOverlay" onclick="closeDrawer()"></div>
  <div class="mob-drawer" id="mobDrawer">
    <div class="mob-drawer-hdr">
      <div class="ico2">⚙️</div>
      <span>EQ-PMS</span>
    </div>
    <nav class="mob-nav">
      <button class="mob-nb" data-mp="dashboard" onclick="mobNavTo('dashboard')">📊 대시보드</button>
      <button class="mob-nb" data-mp="master"    onclick="mobNavTo('master')">📋 Master DB</button>
      <button class="mob-nb" data-mp="setup"     onclick="mobNavTo('setup')">⚙️ Setup</button>
      <button class="mob-nb" data-mp="progress"  onclick="mobNavTo('progress')">📈 진행현황</button>
      <button class="mob-nb" data-mp="equip"     onclick="mobNavTo('equip')">🏭 설비 진척</button>
      <button class="mob-nb" data-mp="detail"    onclick="mobNavTo('detail')">📊 설비별 실적</button>
      <button class="mob-nb" data-mp="company"   onclick="mobNavTo('company')">🏢 기업 관리</button>
    </nav>
    <div class="mob-drawer-ftr">
      <div class="mob-user">
        <div class="udot2"></div>
        <div class="mob-user-info">
          <div class="mob-user-nm" id="mobUNm">-</div>
          <div class="mob-user-rl" id="mobURl">-</div>
        </div>
      </div>
      <button class="mob-logout" onclick="doLogout()">🚪 로그아웃</button>
    </div>
  </div>
  <main class="main">
    <div id="pg_dashboard"></div>
    <div id="pg_master"    style="display:none"></div>
    <div id="pg_setup"     style="display:none"></div>
    <div id="pg_progress"  style="display:none"></div>
    <div id="pg_equip"     style="display:none"></div>
    <div id="pg_detail"    style="display:none"></div>
    <div id="pg_company"   style="display:none"></div>
  </main>
</div>

<!-- ── MODAL: 항목 편집 ─────────────────────────── -->
<div class="mov" id="itemModal" style="display:none">
  <div class="mdl">
    <div class="mhdr"><h3 id="mT">항목 수정</h3><button class="mcls" onclick="CM('itemModal')">✕</button></div>
    <div class="mbdy">
      <input type="hidden" id="mId">
      <div class="frow">
        <div><div class="flbl">프로세스 단계</div><select class="fslc" id="mProc"></select></div>
        <div><div class="flbl">구분</div><input class="finp" id="mCat" placeholder="예: 투자 목적"></div>
      </div>
      <div class="frow s1"><div><div class="flbl">세부 검토 항목 *</div><input class="finp" id="mTtl" placeholder="항목명"></div></div>
      <div class="frow s1"><div><div class="flbl">체크 포인트</div><textarea class="fta" id="mChk"></textarea></div></div>
      <div class="frow">
        <div><div class="flbl">필수여부</div><select class="fslc" id="mReq"><option>필수</option><option>조건부 필수</option><option>선택</option><option>권장</option></select></div>
        <div><div class="flbl">표준일정</div><input class="finp" id="mSch" placeholder="예: 2주"></div>
      </div>
      <div class="frow s1"><div><div class="flbl">필요문서</div><input class="finp" id="mDoc"></div></div>
      <div class="fdiv"><div class="fdln"></div><span class="fdlb">담당 부서</span><div class="fdln"></div></div>
      <div class="frow">
        <div><div class="flbl">총괄담당부서</div><input class="finp" id="mD1"></div>
        <div><div class="flbl">합의부서</div><input class="finp" id="mD2"></div>
      </div>
      <div class="frow">
        <div><div class="flbl">승인부서</div><input class="finp" id="mD3"></div>
        <div></div>
      </div>
    </div>
    <div class="mftr">
      <button class="btn bxs bd" id="btnDel" onclick="delItem()" style="margin-right:auto">🗑️ 삭제</button>
      <button class="btn bs" onclick="CM('itemModal')">취소</button>
      <button class="btn bg" onclick="saveItem()">💾 저장</button>
    </div>
  </div>
</div>

<!-- ── MODAL: 기업 추가 ─────────────────────────── -->
<div class="mov" id="coModal" style="display:none">
  <div class="mdl" style="width:420px">
    <div class="mhdr"><h3>기업 추가</h3><button class="mcls" onclick="CM('coModal')">✕</button></div>
    <div class="mbdy">
      <div class="frow s1"><div><div class="flbl">기업명 *</div><input class="finp" id="coNm" placeholder="기업명"></div></div>
      <div class="frow s1"><div><div class="flbl">업종/분류</div><input class="finp" id="coInd" placeholder="예: 반도체, 디스플레이..."></div></div>
      <div class="frow s1"><div><div class="flbl">비고</div><textarea class="fta" id="coNote"></textarea></div></div>
    </div>
    <div class="mftr">
      <button class="btn bs" onclick="CM('coModal')">취소</button>
      <button class="btn bg" onclick="addCo()">+ 등록</button>
    </div>
  </div>
</div>

<!-- ── TOAST ────────────────────────────────────── -->
<div style="position:fixed;top:60px;right:14px;z-index:9000" id="tw"></div>

<!-- ── JS 모듈 로드 (순서 중요) ──────────────────── -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/master.js"></script>
<script src="js/setup.js"></script>
<script src="js/progress.js"></script>
<script src="js/equip.js"></script>
<script src="js/detail.js"></script>
<script src="js/company.js"></script>

</body>
</html>
