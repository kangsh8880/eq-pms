<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EQ-PMS | 설비투자 프로세스 관리 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;
  --bd:#30363d;--bd2:#21262d;
  --tx:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --ac:#58a6ff;--a2:#1f6feb;
  --gr:#3fb950;--g2:#238636;
  --or:#f0883e;--re:#f85149;--pu:#bc8cff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;font-size:19px;line-height:1.65}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;position:fixed;inset:0;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);z-index:9999}
.lbox{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:44px 38px;width:400px}
.llogo{display:flex;align-items:center;gap:11px;margin-bottom:26px}
.llogo-ico{width:42px;height:42px;background:linear-gradient(135deg,var(--a2),var(--g2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:26px}
.llogo h1{font-size:22px;font-weight:700}
.llogo p{font-size:17px;color:var(--t2)}
.ltit{font-size:26px;font-weight:700;margin-bottom:5px}
.lsub{color:var(--t2);font-size:18px;margin-bottom:24px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:17px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input{width:100%;padding:9px 13px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:19px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.lbtn{width:100%;padding:11px;background:linear-gradient(135deg,var(--a2),#388bfd);border:none;border-radius:7px;color:#fff;font-size:20px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:4px}
.lbtn:hover{opacity:.9;transform:translateY(-1px)}
.lerr{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:7px;padding:9px 13px;color:var(--re);font-size:18px;margin-top:9px;display:none}
.lhint{margin-top:16px;padding:11px 13px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);border-radius:7px;font-size:17px;color:var(--t2)}
.lhint strong{color:var(--ac)}

/* APP */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;position:relative}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;gap:12px;height:62px;position:sticky;top:0;z-index:200}
.hdr-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:20px;flex-shrink:0}
.hdr-logo .ico{width:28px;height:28px;background:linear-gradient(135deg,var(--a2),var(--g2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px}
.hnav{display:flex;gap:2px;flex:1;margin-left:4px}
.nb{padding:5px 11px;border-radius:6px;border:none;background:transparent;color:var(--t2);font-size:18px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:var(--bg3);color:var(--tx)}
.nb.active{background:var(--bg3);color:var(--ac)}
.hr{display:flex;align-items:center;gap:9px;margin-left:auto}
.ubadge{display:flex;align-items:center;gap:6px;padding:4px 11px;background:var(--bg3);border:1px solid var(--bd);border-radius:18px;font-size:17px}
.udot{width:6px;height:6px;border-radius:50%;background:var(--gr)}
.urole{color:var(--t2);font-size:15px;background:var(--bg);padding:1px 5px;border-radius:3px}
.lout{padding:4px 10px;border:1px solid var(--bd);border-radius:5px;background:transparent;color:var(--t2);font-size:17px;cursor:pointer;font-family:inherit;transition:all .15s}
.lout:hover{border-color:var(--re);color:var(--re)}

/* MAIN */
.main{padding:24px 28px;max-width:100%;margin:0;flex:1 1 0;min-height:0;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.pt{font-size:25px;font-weight:700}
.ps{font-size:17px;color:var(--t2);margin-top:2px}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:22px 24px}
.sl{font-size:16px;color:var(--t2);margin-bottom:5px;font-weight:500}
.sv{font-size:32px;font-weight:700;font-family:monospace}
.ss{font-size:16px;color:var(--t2);margin-top:2px}

/* STEP BAR */
.psbar{display:flex;margin-bottom:20px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.ps{flex:1;padding:16px 8px;text-align:center;font-size:15px;font-weight:500;color:var(--t2);cursor:pointer;border-right:1px solid var(--bd);transition:all .15s;position:relative}
.ps:last-child{border-right:none}
.ps:hover{background:var(--bg3);color:var(--tx)}
.ps.active{background:rgba(88,166,255,.15);color:var(--ac);border-bottom:2px solid var(--ac)}
.pse{font-size:24px;display:block;margin-bottom:3px}
.pss{font-size:17px;line-height:1.4;word-break:keep-all;font-weight:600}
.psn{position:absolute;top:4px;right:5px;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;font-size:14px;padding:2px 6px;color:var(--t2)}
.ps.active .psn{background:rgba(88,166,255,.2);border-color:rgba(88,166,255,.4);color:var(--ac);font-weight:700}

/* FILTER */
.flt{display:flex;gap:8px;margin-bottom:13px;align-items:center;flex-wrap:wrap}
.si{flex:1;min-width:180px;padding:9px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--t3)}
.fsel{padding:9px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;cursor:pointer}

/* TABLE */
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--bd)}
.m-scroll-body .tw{border:none;border-radius:0}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed;word-break:break-all;font-size:19px}
.tbl thead tr{background:var(--bg3);border-bottom:1px solid var(--bd)}
.tbl th{padding:12px 14px;text-align:left;font-weight:600;color:var(--t2);font-size:17px;white-space:nowrap;border-right:1px solid var(--bd2)}
.tbl th:last-child{border-right:none}
.tbl tbody tr{border-bottom:1px solid var(--bd2);transition:background .1s}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--bg3)}
.tbl td{padding:8px 12px;border-right:1px solid var(--bd2);vertical-align:middle;line-height:1.4}
.tbl td:last-child{border-right:none}
.fw{font-weight:500;min-width:110px;word-break:keep-all}
.sm{font-size:17px}
.t2{color:var(--t2)}
.t3{color:var(--t3)}
.mono{font-family:monospace}

/* BADGES */
.b{display:inline-flex;align-items:center;padding:1px 6px;border-radius:9px;font-size:16px;font-weight:500;white-space:nowrap}
.br{background:rgba(63,185,80,.12);color:var(--gr);border:1px solid rgba(63,185,80,.25)}
.bo{background:rgba(88,166,255,.12);color:var(--ac);border:1px solid rgba(88,166,255,.25)}
.bc{background:rgba(240,136,62,.12);color:var(--or);border:1px solid rgba(240,136,62,.25)}
.bw{background:rgba(188,140,255,.12);color:var(--pu);border:1px solid rgba(188,140,255,.25)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:18px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--a2);color:#fff}.bp:hover{background:#388bfd}
.bg{background:var(--g2);color:#fff}.bg:hover{background:#2ea043}
.bs{background:var(--bg3);border:1px solid var(--bd);color:var(--tx)}.bs:hover{background:var(--bg4)}
.bd{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.28);color:var(--re)}.bd:hover{background:rgba(248,81,73,.22)}
.bw{background:rgba(240,136,62,.12);border:1px solid rgba(240,136,62,.28);color:var(--or)}.bw:hover{background:rgba(240,136,62,.22)}
.bsm{padding:4px 9px;font-size:17px}
.bxs{padding:2px 7px;font-size:16px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:22px}
.ch{font-size:18px;font-weight:600;display:block;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.mt14{margin-top:14px}
.mb7{margin-bottom:7px}
.mb9{margin-bottom:9px}
.mb12{margin-bottom:12px}
.mt8{margin-top:8px}
.mt10{margin-top:10px}
.flex-sb{display:flex;justify-content:space-between;align-items:center}
.flex-g{display:flex;gap:7px;align-items:center}
.flex4{display:flex;gap:12px;flex-wrap:wrap}
.ml-auto{margin-left:auto}

/* PROGRESS BAR */
.pb{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g2),var(--gr));transition:width .5s ease}

/* CHART BARS */
.brow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.blbl{width:65px;font-size:16px;color:var(--t2);text-align:right;flex-shrink:0}
.btrack{flex:1;background:var(--bg3);border-radius:3px;height:16px;position:relative}
.bfill{height:100%;background:linear-gradient(90deg,var(--a2),var(--ac));border-radius:3px}
.bval{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--t2);font-family:monospace}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;font-size:14px;background:var(--bg3);border:1px solid var(--bd);color:var(--t2);white-space:normal;word-break:keep-all;text-align:center;line-height:1.4}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--t2)}
.ei{font-size:42px;margin-bottom:10px}
.empty h3{font-size:20px;margin-bottom:5px;color:var(--tx)}

/* TOAST */
.tw2{position:fixed;top:60px;right:14px;z-index:9000;display:flex;flex-direction:column;gap:6px}
#tw{display:flex;flex-direction:column;gap:6px}
.toast{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 13px;min-width:250px;animation:tin .22s ease;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(63,185,80,.4)}
.toast.error{border-color:rgba(248,81,73,.4)}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mdl{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;width:700px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.mhdr{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mhdr h3{font-size:20px;font-weight:600}
.mcls{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mcls:hover{border-color:var(--re);color:var(--re)}
.mbdy{padding:20px}
.mftr{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.s1{grid-template-columns:1fr}
.flbl{font-size:16px;font-weight:600;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.finp,.fslc,.fta{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;transition:border-color .2s}
.finp:focus,.fslc:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(88,166,255,.1)}
.fta{resize:vertical;min-height:65px}
.fdiv{display:flex;align-items:center;gap:8px;margin:14px 0 10px}
.fdln{flex:1;height:1px;background:var(--bd)}
.fdlb{font-size:15px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* HIGHLIGHT */
.hl,mark.hl{background:rgba(240,200,62,.3);border-radius:2px;padding:0 2px;font-style:normal}

/* ─── SETUP PAGE ─────────────────────────────────── */
.topbar{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar select{max-width:260px;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:18px;font-family:inherit;outline:none;cursor:pointer}
.topbar select:focus{border-color:var(--ac)}
.info-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);border-radius:14px;font-size:17px;color:var(--gr);font-weight:500}

.s3col { display:grid; grid-template-columns:220px 1fr 1fr; gap:18px; flex:1 1 0; min-height:0; }
.spanel { background:var(--bg2); border:1px solid var(--bd); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
.shdr{padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--bg3);display:flex;align-items:center;justify-content:space-between;font-size:18px;font-weight:600;gap:8px;flex-wrap:wrap}
.ssearch{padding:7px 11px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.ssearch input{width:100%;padding:5px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:17px;font-family:inherit;outline:none;transition:border-color .15s}
.ssearch input:focus{border-color:var(--ac)}

/* Proc list */
#sProcList,#sMastBody,#sSelBody{flex:1;overflow-y:auto}
.pi{padding:10px 14px;border-bottom:1px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .12s}
.pi:last-child{border-bottom:none}
.pi:hover{background:var(--bg3)}
.pi.active{background:rgba(88,166,255,.08);border-left:2px solid var(--ac)}
.pnm{font-size:18px;font-weight:500}
.psb{font-size:16px;color:var(--t2);margin-top:1px}
.pst{text-align:right;font-size:17px}
.psc{font-weight:600;color:var(--gr)}
.pstot{color:var(--t2)}

/* Master items */
.mgrp{display:flex;align-items:center;justify-content:space-between;padding:5px 11px;background:var(--bg3);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
.mgn{font-size:16px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.mgc{display:flex;align-items:center;gap:5px;font-size:16px;color:var(--t2);cursor:pointer}
.mcard{padding:10px 11px;border-bottom:1px solid var(--bd2);display:flex;align-items:flex-start;gap:9px;transition:background .1s;cursor:pointer}
.mcard:last-child{border-bottom:none}
.mcard:hover{background:rgba(255,255,255,.02)}
.mcard.msel{background:rgba(63,185,80,.05)}
.mchk{width:15px;height:15px;accent-color:var(--gr);flex-shrink:0;margin-top:2px;cursor:pointer}
.mb{flex:1;min-width:0}
.mt{font-size:18px;font-weight:500;margin-bottom:2px;word-break:keep-all}
.mc2{font-size:16px;color:var(--t2);line-height:1.4;margin-bottom:3px;word-break:keep-all}
.mm{display:flex;gap:4px;flex-wrap:wrap}

/* Selected items */
.sitem{border-bottom:1px solid var(--bd2)}
.sitem:last-child{border-bottom:none}
.sih{padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}
.sih:hover{background:rgba(255,255,255,.02)}
.sin{width:18px;height:18px;border-radius:50%;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--ac);flex-shrink:0;font-family:monospace}
.sit{font-size:18px;font-weight:500;flex:1;word-break:keep-all}
.stog{font-size:17px;color:var(--t2);transition:transform .2s;display:inline-block}
.sib{padding:0 12px 12px;border-top:1px solid var(--bd2);background:rgba(88,166,255,.03)}
.sf{margin-top:8px}
.sfl{font-size:15px;font-weight:600;color:var(--t3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.sfin{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:17px;font-family:inherit;outline:none;transition:border-color .15s}
.sfin:focus{border-color:var(--ac)}
.sfta{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:17px;font-family:inherit;outline:none;resize:vertical;min-height:50px;transition:border-color .15s}
.sfta:focus{border-color:var(--ac)}
.sfrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.drow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}
.dl{font-size:15px;color:var(--t3);margin-bottom:2px}
.rmv{padding:2px 7px;border-radius:4px;border:1px solid rgba(248,81,73,.3);background:rgba(248,81,73,.08);color:var(--re);font-size:16px;cursor:pointer;font-family:inherit;transition:all .15s}
.rmv:hover{background:rgba(248,81,73,.2)}
.sempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;color:var(--t2)}
.sempty p{font-size:17px}
.edit-hint{color:var(--ac);font-size:15px}

/* ── Master DB: 검색바 상단 고정, 테이블 스크롤 ─── */
.m-sticky-hdr{
  position:sticky;
  top:62px;
  z-index:100;
  background:var(--bg);
  padding-bottom:12px;
}
.m-scroll-body{
  overflow-y:auto;
  max-height:calc(100vh - 340px);
  min-height:300px;
}
.m-scroll-body .tw{border:none;border-radius:0}
.m-scroll-body .tbl thead tr{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg3);
  box-shadow:0 1px 0 var(--bd);
}

/* Save bar */
.savebar{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:11px 16px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
#saveStats{display:flex;gap:14px;font-size:18px;color:var(--t2)}
#saveStats b{color:var(--tx)}

/* COMPANY */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.ccard{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:16px;transition:all .2s}
.ccard:hover{border-color:var(--ac);transform:translateY(-1px)}
.cnm{font-size:22px;font-weight:600;margin-bottom:4px;text-align:center}
.cmt{font-size:19px;color:var(--t2);text-align:center}
.cst{margin-top:11px;display:flex;gap:11px;justify-content:center}
.csv{font-size:26px;font-weight:700;font-family:monospace}
.csl{font-size:18px;color:var(--t2)}
.cnote{text-align:center;margin-top:7px;font-size:19px;color:var(--t3)}

@media(max-width:1100px){.s3col { display:grid; grid-template-columns:220px 1fr 1fr; gap:18px; flex:1 1 0; min-height:0; }}

/* ══════════════════════════════════════════════════
   📱 모바일 반응형 (768px 이하)
══════════════════════════════════════════════════ */

/* 햄버거 버튼 */
.hbg-btn {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  flex-shrink: 0;
}
.hbg-btn span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--t2);
  border-radius: 2px;
  transition: all .25s;
}
.hbg-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hbg-btn.open span:nth-child(2) { opacity: 0; }
.hbg-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

/* 모바일 드로어 오버레이 */
.mob-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 190;
}
.mob-overlay.show { display: block; }

/* 모바일 사이드 드로어 */
.mob-drawer {
  position: fixed;
  top: 0;
  left: -100%;
  width: 260px;
  height: 100%;
  background: var(--bg2);
  border-right: 1px solid var(--bd);
  z-index: 195;
  transition: left .25s ease;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.mob-drawer.open { left: 0; }
.mob-drawer-hdr {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  gap: 10px;
}
.mob-drawer-hdr .ico2 {
  width: 28px; height: 28px;
  background: linear-gradient(135deg,var(--a2),var(--g2));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.mob-drawer-hdr span { font-weight: 700; font-size: 17px; }
.mob-nav {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}
.mob-nb {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 12px 14px;
  border: none;
  background: transparent;
  color: var(--t2);
  font-size: 16px;
  font-weight: 500;
  font-family: inherit;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
  margin-bottom: 2px;
}
.mob-nb:hover { background: var(--bg3); color: var(--tx); }
.mob-nb.active { background: rgba(88,166,255,.12); color: var(--ac); }
.mob-drawer-ftr {
  padding: 12px 8px;
  border-top: 1px solid var(--bd);
}
.mob-user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg3);
  border-radius: 8px;
  margin-bottom: 8px;
}
.mob-user .udot2 {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gr);
  flex-shrink: 0;
}
.mob-user-info { flex: 1; min-width: 0; }
.mob-user-nm { font-size: 15px; font-weight: 600; }
.mob-user-rl { font-size: 13px; color: var(--t2); }
.mob-logout {
  width: 100%;
  padding: 10px;
  background: rgba(248,81,73,.1);
  border: 1px solid rgba(248,81,73,.25);
  border-radius: 8px;
  color: var(--re);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
}
.mob-logout:hover { background: rgba(248,81,73,.18); }

@media(max-width:768px) {
  /* 바디 기본 폰트 크기 */
  body { font-size: 15px; }

  /* 로그인 박스 */
  .lbox { width: calc(100vw - 32px); max-width: 400px; padding: 28px 20px; }
  .ltit { font-size: 22px; }
  .lsub { font-size: 15px; }
  .fg input { font-size: 16px; }
  .lbtn { font-size: 17px; }

  /* 헤더 */
  .hdr { padding: 0 14px; height: 54px; }
  .hdr-logo { font-size: 17px; }
  .hdr-logo .ico { width: 24px; height: 24px; font-size: 16px; }
  .hnav { display: none; } /* PC 네비 숨김 */
  .hr { display: none; }  /* PC 유저뱃지 숨김 */
  .hbg-btn { display: flex; margin-left: auto; }

  /* 메인 패딩 */
  .main { padding: 14px 12px; }

  /* 페이지 고정 레이아웃 높이 조정 */
  #pg_master, #pg_setup, #pg_progress, #pg_equip, #pg_detail {
    height: calc(100vh - 90px);
  }

  /* 통계카드: 2열→1열 */
  .sg4 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .sc { padding: 14px 16px; }
  .sl { font-size: 13px; }
  .sv { font-size: 24px; }
  .ss { font-size: 13px; }

  /* 대시보드 그리드 */
  .grid2 { grid-template-columns: 1fr; gap: 12px; }
  .card { padding: 14px; }
  .ch { font-size: 15px; }

  /* 기업 그리드 */
  .cgrid { grid-template-columns: 1fr; gap: 10px; }

  /* 필터바 */
  .flt { flex-direction: column; }
  .si { min-width: unset; font-size: 15px; }
  .fse { font-size: 15px; }

  /* 테이블 폰트 */
  .tbl { font-size: 13px; }
  .tbl th { padding: 8px 8px; font-size: 12px; }
  .tbl td { padding: 7px 8px; }

  /* 진행현황 스텝바 */
  .pr-stepbar { flex-wrap: wrap; border-radius: 8px; }
  .pr-step {
    flex: 0 0 calc(20% - 1px);
    min-width: 0;
    padding: 10px 4px 8px;
    border-bottom: 1px solid var(--bd);
  }
  .pr-se { font-size: 20px; }
  .pr-ss { font-size: 13px; line-height: 1.2; }
  .pr-sc { font-size: 13px; }
  .pr-pbar { width: 70%; height: 4px; }
  .pr-pct { font-size: 16px; }

  /* 진행현황 통계카드 */
  .pr-stat-row { flex-wrap: wrap; gap: 8px; }
  .pr-stat-card { flex: 0 0 calc(50% - 4px); padding: 8px 12px; gap: 8px; }
  .pr-stat-lbl { font-size: 12px; }
  .pr-stat-val { font-size: 18px; }

  /* Setup 3컬럼 → 1컬럼 */
  .s3col { display: flex; flex-direction: column; gap: 0; }
  .spanel { min-height: 200px; max-height: 45vh; }

  /* 모달 */
  .mdl { width: 96vw !important; max-height: 90vh; }
  .mhdr h3 { font-size: 16px; }
  .mbdy { padding: 14px; }
  .mftr { padding: 10px 14px; }
  .frow { grid-template-columns: 1fr; gap: 8px; }
  .frow.s1 { grid-template-columns: 1fr; }
  .flbl { font-size: 12px; }
  .finp, .fslc, .fta { font-size: 14px; padding: 7px 9px; }

  /* 버튼 */
  .btn { font-size: 14px; padding: 7px 12px; }
  .bsm { font-size: 13px; padding: 5px 10px; }

  /* 페이지 헤더 */
  .ph { flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 14px; }
  .pt { font-size: 19px; }
  .ps { font-size: 13px; }

  /* 편집 버튼 */
  .editBtn { width: 30px; height: 26px; font-size: 13px; }

  /* Master DB 스크롤 높이 */
  .m-scroll-body { max-height: calc(100vh - 300px); }

  /* 토스트 위치 */
  #tw { right: 8px; top: 58px; }
  .toast { min-width: 180px; font-size: 14px; padding: 8px 11px; }
}

@media(max-width:400px) {
  .sg4 { grid-template-columns: 1fr 1fr; }
  .pr-step { flex: 0 0 calc(33.33% - 1px); }
  .pr-stat-card { flex: 0 0 100%; }
  .hdr-logo span { display: none; } /* 로고 텍스트 숨김 */
}


/* ══ 공통: 페이지 고정 헤더 + 스크롤 바디 ══════════ */
#pg_master, #pg_setup, #pg_progress, #pg_equip {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 110px);
  overflow: hidden;
}
#pg_detail, #pg_company, #pg_dashboard {
  overflow-y: auto;
  height: calc(100vh - 110px);
}
/* 고정 헤더: 타이틀/스텝바/검색바 */
.pg-hdr {
  flex-shrink: 0;               /* 절대 줄어들지 않음 */
  background: var(--bg);
  padding-bottom: 8px;
}
/* 스크롤 바디: 남은 공간 전부 차지 + 세로 스크롤 */
.pg-body {
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
/* Master DB 테이블 래퍼 */
.mTblWrap {
  border: 1px solid var(--bd);
  border-radius: 8px;
  flex: 1 1 0;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.mTblWrap .tw { border: none; border-radius: 0; flex: 1 1 0; overflow-y: auto; min-height: 0; }
.pg-body .tw { overflow-y: auto; }

/* 테이블 thead 고정 */
.mTblWrap .tw .tbl thead tr {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg3);
  box-shadow: 0 1px 0 var(--bd);
}
/* 진행현황 */
#prStat { flex-shrink: 0; padding: 4px 0 12px; }
#prBody { flex: 1 1 0; overflow-y: auto; min-height: 0; padding: 2px 0 24px; }
/* Setup s3col */
.s3col {
  flex: 1 1 0;
  min-height: 0;
}
/* 편집 버튼 스타일 */
.editBtn {
  width: 36px;
  height: 32px;
  border: 1px solid var(--bd);
  border-radius: 6px;
  background: var(--bg3);
  color: var(--tx);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  transition: all .15s;
}
.editBtn:hover {
  border-color: var(--ac);
  background: rgba(88,166,255,.1);
}
/* pg_master가 flex일 때 main 패딩 조정 */
#pg_master.visible .main {
  overflow: hidden;
}


/* prBody thead: step-hdr 방식으로 대체됨 */
#prCont .tw {
  overflow-x: auto;
  overflow-y: visible;
}
/* prStat: 통계카드 고정 영역 */
#prStat {
  padding: 0 0 10px 0;
}

/* ── 진행현황 단계별 레이아웃 ──────────────────────── */
.step-block {
  margin-bottom: 16px;
  border: 1px solid var(--bd);
  border-radius: 10px;
  overflow: visible;
  background: var(--bg2);
}
/* 단계 헤더: 단계명 + 진행바 + 컬럼헤더 → 고정 */
.step-hdr {
  padding: 14px 16px 0;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--bd);
  border-radius: 10px 10px 0 0;
}
/* thead 용 테이블: 레이아웃 공유를 위해 tbody 테이블과 같은 컬럼 */
.step-thead-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin-top: 8px;
}
.step-thead-tbl th {
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--t2);
  font-size: 15px;
  white-space: nowrap;
  border-right: 1px solid var(--bd2);
  background: var(--bg3);
}
.step-thead-tbl th:last-child { border-right: none; }
/* 바디: tbody 만 스크롤 */
.step-body {
  overflow-y: auto;
  max-height: 400px;
  border-radius: 0 0 10px 10px;
}
.step-body-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.step-body-tbl td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--bd2);
  border-right: 1px solid var(--bd2);
  vertical-align: middle;
  font-size: 15px;
}
.step-body-tbl td:last-child { border-right: none; }
.step-body-tbl tr:last-child td { border-bottom: none; }
.step-body-tbl tr { transition: background .1s; }
.step-body-tbl tr:hover { background: var(--bg3); }


/* ══ 진행현황 새 스텝바 ══════════════════════════════ */
.pr-stepbar {
  display: flex;
  gap: 0;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 6px;
}
.pr-step {
  flex: 1;
  padding: 18px 8px 16px;
  text-align: center;
  cursor: pointer;
  border-right: 1px solid var(--bd);
  transition: all .15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
}
.pr-step:last-child { border-right: none; }
.pr-step:hover { background: var(--bg3); }
.pr-step.pr-active {
  background: rgba(88,166,255,.1);
  border-bottom: 3px solid var(--ac);
}
.pr-step-empty { opacity: .4; cursor: default; }
.pr-step-empty:hover { background: transparent; }
.pr-se { font-size: 28px; line-height: 1; }
.pr-ss { font-size: 20px; font-weight: 600; color: var(--t2); word-break: keep-all; line-height: 1.3; }
.pr-step.pr-active .pr-ss { color: var(--ac); }
.pr-sc { font-size: 19px; color: var(--t2); font-family: 'JetBrains Mono', monospace; }
.pr-pbar {
  width: 80%;
  height: 6px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.pr-pfill {
  height: 100%;
  background: linear-gradient(90deg, var(--g2), var(--gr));
  border-radius: 2px;
  transition: width .4s ease;
}
.pr-pct {
  font-size: 23px;
  font-weight: 700;
  color: var(--t2);
  font-family: 'JetBrains Mono', monospace;
}
.pr-pct.pr-done { color: var(--gr); }
.pr-step.pr-active .pr-pct { color: var(--ac); }

/* ══ 진행현황 항목 영역 ══════════════════════════════ */
.pr-items-hdr {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 10px 10px 0 0;
  padding: 16px 18px 14px;
  border-bottom: none;
  position: sticky;
  top: 0;
  z-index: 20;
}
.pr-tbl-wrap {
  border: 1px solid var(--bd);
  border-radius: 0 0 10px 10px;
  overflow: hidden;
}
.pr-tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.pr-tbl thead tr {
  background: var(--bg3);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pr-tbl th {
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--t2);
  font-size: 14px;
  border-right: 1px solid var(--bd2);
  white-space: nowrap;
}
.pr-tbl th:last-child { border-right: none; }
.pr-tbl tbody tr { border-bottom: 1px solid var(--bd2); transition: background .1s; }
.pr-tbl tbody tr:last-child { border-bottom: none; }
.pr-tbl tbody tr:hover { background: var(--bg3); }
.pr-tbl td {
  padding: 10px 12px;
  border-right: 1px solid var(--bd2);
  vertical-align: middle;
  font-size: 15px;
}
.pr-tbl td:last-child { border-right: none; }
.pr-done-row { opacity: .6; }
.pr-done-row td:nth-child(2) { text-decoration: line-through; color: var(--t2); }
.pr-chk {
  width: 18px; height: 18px;
  accent-color: var(--gr);
  cursor: pointer;
}


/* ── 진행현황 통계 (compact 가로형) ────────────────── */
.pr-stat-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}
.pr-stat-card {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 9px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.pr-stat-lbl {
  font-size: 14px;
  color: var(--t2);
  font-weight: 500;
  white-space: nowrap;
}
.pr-stat-val {
  font-size: 24px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}

/* ══ 🏭 설비 투자 진척 페이지 CSS ══════════════════ */

/* 상단 필터바 */
.eq-filterbar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  background: var(--bg2); border: 1px solid var(--bd); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 14px;
}
.eq-filterbar select, .eq-filterbar input {
  padding: 7px 10px; background: var(--bg3); border: 1px solid var(--bd);
  border-radius: 7px; color: var(--tx); font-size: 14px; font-family: inherit; outline: none;
}
.eq-filterbar select:focus, .eq-filterbar input:focus { border-color: var(--ac); }
.eq-filter-label { font-size: 13px; color: var(--t2); white-space: nowrap; }

/* 진척 현황 메인 테이블 */
.eq-tbl-wrap {
  flex: 1 1 0; min-height: 0;
  border: 1px solid var(--bd); border-radius: 8px;
  overflow: auto;
}
.eq-tbl {
  width: 100%; border-collapse: collapse;
  font-size: 13px; table-layout: fixed;
  min-width: 1400px;
}
.eq-tbl thead tr { position: sticky; top: 0; z-index: 15; }
.eq-tbl thead th {
  background: var(--bg3); padding: 9px 8px;
  text-align: center; font-size: 12px; font-weight: 600;
  color: var(--t2); border-right: 1px solid var(--bd2);
  border-bottom: 1px solid var(--bd); white-space: nowrap;
}
.eq-tbl thead th.th-fix { position: sticky; left: 0; z-index: 20; background: var(--bg3); }
.eq-tbl thead th.th-fix2 { position: sticky; left: 90px; z-index: 20; background: var(--bg3); }
.eq-tbl thead th.th-fix3 { position: sticky; left: 220px; z-index: 20; background: var(--bg3); }
.eq-tbl thead th:last-child { border-right: none; }
.eq-tbl tbody tr { border-bottom: 1px solid var(--bd2); transition: background .1s; }
.eq-tbl tbody tr:hover { background: var(--bg3); }
.eq-tbl tbody tr.eq-row-target { background: rgba(88,166,255,.04); }
.eq-tbl tbody td {
  padding: 0; border-right: 1px solid var(--bd2);
  vertical-align: middle; text-align: center;
}
.eq-tbl tbody td.td-fix {
  position: sticky; left: 0; z-index: 5;
  background: var(--bg2); padding: 7px 8px;
}
.eq-tbl tbody td.td-fix2 {
  position: sticky; left: 90px; z-index: 5;
  background: var(--bg2); padding: 7px 8px; text-align: left;
}
.eq-tbl tbody td.td-fix3 {
  position: sticky; left: 220px; z-index: 5;
  background: var(--bg2); padding: 7px 8px; text-align: left;
}
.eq-tbl tbody tr:hover td.td-fix,
.eq-tbl tbody tr:hover td.td-fix2,
.eq-tbl tbody tr:hover td.td-fix3 { background: var(--bg3); }

/* 날짜 셀 */
.eq-date-cell {
  display: flex; flex-direction: column; gap: 1px;
  padding: 4px 6px; min-height: 48px; justify-content: center;
}
.eq-date-row {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px;
}
.eq-date-lbl {
  font-size: 10px; color: var(--t3);
  background: var(--bg3); border-radius: 3px;
  padding: 0 3px; white-space: nowrap; flex-shrink: 0;
}
.eq-date-input {
  width: 100%; background: transparent; border: none;
  color: var(--tx); font-size: 11px; font-family: 'JetBrains Mono', monospace;
  outline: none; cursor: pointer; padding: 2px 3px;
  border-radius: 3px; transition: background .15s;
}
.eq-date-input:focus { background: var(--bg3); }
.eq-date-input.eq-date-target { color: var(--ac); }
.eq-date-input.eq-date-actual { color: var(--gr); }
.eq-date-input.eq-date-delay { color: var(--re) !important; border-color: rgba(248,81,73,.4) !important; }

/* 진행상태 셀 */
.eq-step-cell { padding: 3px 5px; }
.eq-step-done { background: rgba(63,185,80,.15); }
.eq-step-delay { background: rgba(248,81,73,.1); }
.eq-step-wip { background: rgba(88,166,255,.1); }

/* 공정/설비 행 구분 */
.eq-row-proc td.td-fix { background: var(--bg3) !important; font-weight: 700; font-size: 13px; }
.eq-row-proc td.td-fix2 { background: var(--bg3) !important; font-weight: 600; }
.eq-row-proc td.td-fix3 { background: var(--bg3) !important; }
.eq-row-eq td { font-size: 12px; }
.eq-row-type-lbl {
  font-size: 10px; padding: 1px 5px; border-radius: 3px; white-space: nowrap;
}
.eq-row-type-t { background: rgba(88,166,255,.15); color: var(--ac); }
.eq-row-type-a { background: rgba(63,185,80,.15); color: var(--gr); }

/* 설비 추가 버튼 */
.eq-add-row td { padding: 6px 10px; text-align: center; }

/* 진행률 바 인라인 */
.eq-pct-cell { padding: 4px 8px; text-align: center; }
.eq-pct-val { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.eq-mini-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 3px; }
.eq-mini-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* 설비 편집 버튼 */
.eq-btn-edit {
  width: 26px; height: 24px; border: 1px solid var(--bd); border-radius: 4px;
  background: var(--bg3); color: var(--t2); cursor: pointer; font-size: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .15s; margin: 0 1px;
}
.eq-btn-edit:hover { border-color: var(--ac); color: var(--ac); background: rgba(88,166,255,.1); }
.eq-btn-del:hover { border-color: var(--re); color: var(--re); background: rgba(248,81,73,.1); }

/* 모달 */
.eq-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.eq-modal-grid.s1 { grid-template-columns: 1fr; }
.eq-flbl { font-size: 12px; font-weight: 600; color: var(--t2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .3px; }
.eq-finp, .eq-fsel {
  width: 100%; padding: 7px 10px;
  background: var(--bg3); border: 1px solid var(--bd);
  border-radius: 7px; color: var(--tx); font-size: 14px;
  font-family: inherit; outline: none; transition: border-color .2s;
}
.eq-finp:focus, .eq-fsel:focus { border-color: var(--ac); }

/* 통계 헤더 */
.eq-stat-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.eq-stat-card {
  flex: 1; min-width: 110px;
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 9px; padding: 9px 14px;
  display: flex; align-items: center; gap: 10px;
}
.eq-stat-lbl { font-size: 12px; color: var(--t2); }
.eq-stat-val { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-left: auto; }

/* 담당자/업체 chip */
.eq-chip { font-size: 12px; background: var(--bg3); border: 1px solid var(--bd); border-radius: 4px; padding: 1px 6px; color: var(--t2); white-space: nowrap; }

/* 반응형 */
@media(max-width:768px) {
  .eq-filterbar { gap: 6px; }
  .eq-tbl { font-size: 11px; }
  .eq-stat-card { min-width: 80px; padding: 7px 10px; }
  .eq-stat-val { font-size: 16px; }
}

function xe(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function hlQ(txt, q) {
  var s = xe(txt);
  if (!q) return s;
  return s.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'), '<mark class="hl">$1</mark>');
}

function bdg(req) {
  var cls = { '필수':'br', '선택':'bo', '조건부 필수':'bc', '권장':'bw' };
  return '<span class="b ' + (cls[req] || 'bo') + '">' + xe(req || '-') + '</span>';
}

function toast(title, msg, type) {
  var icons = { success:'✅', error:'❌', info:'ℹ️' };
  var el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.innerHTML = '<span style="font-size:19px">' + (icons[type] || 'ℹ️') + '</span>'
    + '<div><b style="font-size:18px">' + xe(title) + '</b>'
    + '<div style="font-size:17px;color:var(--t2)">' + xe(msg) + '</div></div>';
  gid('tw').appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

var GH = {
  owner: 'kangsh8880',

  path:  'data/eqpms_state.json',

// PAT 저장/로드 (localStorage XOR 난독화)
function ghPatEncode(s){ var k='eqpms2026'; return btoa(s.split('').map(function(c,i){return String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length));}).join('')); }
function ghPatDecode(s){ var k='eqpms2026'; return atob(s).split('').map(function(c,i){return String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length));}).join(''); }
function ghPatSave(pat){ try{ localStorage.setItem('_ghp', ghPatEncode(pat)); }catch(e){} }
function ghPatLoad(){ try{ var v=localStorage.getItem('_ghp'); return v?ghPatDecode(v):null; }catch(e){return null;} }
function ghPatClear(){ try{ localStorage.removeItem('_ghp'); }catch(e){} }

function ghHeaders() {
  return {
    'Authorization': 'Bearer ' + GH.pat,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };
}

// GitHub에서 데이터 불러오기
async function ghLoad() {
  if (!GH.pat) { setSyncStatus('idle', ''); return null; }
  setSyncStatus('load', '불러오는 중...');
  try {
    var url = 'https://api.github.com/repos/' + GH.owner + '/' + GH.repo
            + '/contents/' + GH.path + '?t=' + Date.now();
    var res = await fetch(url, { headers: ghHeaders() });
    if (res.status === 401) {
      setSyncStatus('err', 'PAT 오류');
      return null;
    }
    if (res.status === 404) {
      GH.sha = null;
      setSyncStatus('ok', '신규 저장소');
      return null;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    GH.sha = data.sha;
    var b64 = data.content.replace(/\n/g, '');
    var decoded = JSON.parse(decodeURIComponent(escape(atob(b64))));
    setSyncStatus('ok', '로드 완료');
    return decoded;
  } catch(e) {
    setSyncStatus('err', '로드 실패');
    console.error('ghLoad error:', e);
    return null;
  }
}

// GitHub에 데이터 저장
async function ghSave(stateObj) {
  if (!GH.pat) { setSyncStatus('idle', ''); return; }
  setSyncStatus('saving', '저장 중...');
  try {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(stateObj, null, 2))));
    var now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Ho_Chi_Minh' });
    var body = { message: '[EQ-PMS] Auto-save ' + now, content: content };
    if (GH.sha) body.sha = GH.sha;
    var url = 'https://api.github.com/repos/' + GH.owner + '/' + GH.repo
            + '/contents/' + GH.path;
    var res = await fetch(url, {
      method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body)
    });
    if (res.status === 409) {
      // SHA 충돌 → 최신 SHA 재조회 후 재시도
      var chk = await fetch(url + '?t=' + Date.now(), { headers: ghHeaders() });
      if (chk.ok) { var cd = await chk.json(); GH.sha = cd.sha; body.sha = cd.sha; }
      res = await fetch(url, { method:'PUT', headers:ghHeaders(), body:JSON.stringify(body) });
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var rd = await res.json();
    GH.sha = rd.content ? rd.content.sha : GH.sha;
    var t = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    setSyncStatus('ok', '저장됨 ' + t);
  } catch(e) {
    setSyncStatus('err', '저장 실패');
    console.error('ghSave error:', e);
  }
}

function setSyncStatus(status, text) {
  var badge = gid('syncStatus');
  var icon  = gid('syncIcon');
  var txt   = gid('syncText');
  if (!badge) return;
  badge.className = 'sync-badge sync-' + status;
  var icons = { idle:'☁️', saving:'🔄', ok:'✅', err:'❌', load:'⏳' };
  var ikeys = { idle:'sync_idle', saving:'sync_saving', ok:'sync_ok', err:'sync_err', load:'sync_load' };
  icon.textContent = icons[status] || '☁️';
  txt.textContent = (ikeys[status] && typeof t === 'function') ? t(ikeys[status]) : text;
}

function mergeAndApply(remote) {
  if (!remote) return;
  if (remote.companies && remote.companies.length) state.companies = remote.companies;
  if (remote.setups)       state.setups       = remote.setups;
  if (remote.equipments)   state.equipments   = remote.equipments;
  if (remote.gongMaster)   state.gongMaster   = remote.gongMaster;
  if (remote.vendorMaster) state.vendorMaster = remote.vendorMaster;
  if (remote.master && remote.master.length) state.master = remote.master;
  lsSet('companies',    state.companies);
  lsSet('setups',       state.setups);
  lsSet('equipments',   state.equipments);
  lsSet('gongMaster',   state.gongMaster);
  lsSet('vendorMaster', state.vendorMaster);
}

// 3초 디바운스 자동저장
function saveAll() {
  lsSet('companies',    state.companies);
  lsSet('setups',       state.setups);
  lsSet('master',       state.master);
  lsSet('equipments',   state.equipments);
  lsSet('gongMaster',   state.gongMaster);
  lsSet('vendorMaster', state.vendorMaster);
  if (!GH.pat) return;
  if (GH.saveTimer) clearTimeout(GH.saveTimer);
  GH.saveTimer = setTimeout(function() {
    GH.saveTimer = null;
    ghSave({
      companies: state.companies, setups: state.setups,
      master: state.master, equipments: state.equipments,
      gongMaster: state.gongMaster, vendorMaster: state.vendorMaster
    });
  }, 3000);
}

  el.className = 'mov';
  el.onclick = function(e){ if(e.target===el) el.remove(); };
  el.innerHTML = '<div class="mdl" style="max-width:460px">'
    + '<div class="mhdr"><h3>🔑 GitHub PAT 설정</h3>'
    + '<button class="mcls" id="patMClose">✕</button></div>'

    + '<div style="font-size:16px;color:var(--t2);margin-bottom:14px">'
    + t('pat_current') + ': <code style="color:var(--ac);font-size:14px">' + masked + '</code></div>'
    + '<div class="frow s1"><div class="flbl">' + t('pat_input') + '</div>'
    + '<input type="password" id="modalPatInput" class="finp" placeholder="ghp_xxxxxxxxxxxx"'
    + ' autocomplete="off" style="font-family:monospace;font-size:13px"></div>'
    + '<div style="font-size:12px;color:var(--t3);margin-top:6px">'
    + t('pat_warning') + '</div>'
    + '</div>'
    + '<div class="mftr">'
    + '<button class="btn bd bsm" id="patMDel">' + t('pat_del') + '</button>'
    + '<button class="btn bp bsm" id="patMSave">' + t('pat_save') + '</button>'
    + '</div></div>';
  document.body.appendChild(el);
  document.getElementById('patMClose').onclick = function(){ el.remove(); };
  document.getElementById('patMDel').onclick = function(){
    ghPatClear(); GH.pat = null; el.remove();
    toast('삭제됨','PAT가 삭제되었습니다','info');
  };
  document.getElementById('patMSave').onclick = function(){
    var pat = document.getElementById('modalPatInput').value.trim();
    if (!pat) { toast('오류','PAT를 입력해주세요','error'); return; }
    ghPatSave(pat); GH.pat = pat; GH.sha = null; el.remove();
    setSyncStatus('load','재연결 중...');
    ghLoad().then(function(remote){ if(remote) mergeAndApply(remote); toast('연결 성공','GitHub 연결 완료','success'); });
  };
}

function doLogin() {
  var id = gid('loginId').value.trim();
  var pw = gid('loginPw').value;
  if (USERS[id] && USERS[id].pw === pw) {
    var sp=(function(){try{var v=localStorage.getItem('_ghp');if(!v)return null;var k='eqpms2026';return atob(v).split('').map(function(c,i){return String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length));}).join('');}catch(e){return null;}})();
    GH.pat=sp||null;
    state.curUser = { id: id, name: USERS[id].name, role: USERS[id].role };
    gid('loginScreen').style.display = 'none';
    gid('app').style.display = 'flex';
    gid('uNm').textContent = state.curUser.name;
    gid('uRl').textContent = state.curUser.role;
    var mn = gid('mobUNm'); if (mn) mn.textContent = state.curUser.name;
    var mr = gid('mobURl'); if (mr) mr.textContent = state.curUser.role;
    gid('loginErr').style.display = 'none';
    appInit();
    toast('로그인 성공', state.curUser.name + '님 환영합니다!', 'success');
  } else {
    gid('loginErr').style.display = 'block';
  }
}

function doLogout() {
  state.curUser = null;
  gid('app').style.display = 'none';
  gid('loginScreen').style.display = 'flex';
  gid('loginId').value = '';
  gid('loginPw').value = '';
}

function t(k){ var d=I18N[_lang]||I18N.ko; return d[k]!==undefined?d[k]:(I18N.ko[k]||k); }

function setLang(lang){
  _lang=lang;
  localStorage.setItem('eq_lang',lang);
  ['ko','en','zh','vi'].forEach(function(l){
    var b=document.getElementById('lang_'+l);
    if(b) b.className='lang-btn'+(l===lang?' active':'');
    if(b) { b.style.background=l===lang?'var(--ac)':'transparent';
             b.style.borderColor=l===lang?'var(--ac)':'var(--bd)';
             b.style.color=l===lang?'#fff':'var(--t2)'; }
  });
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent=t(el.getAttribute('data-i18n'));
  });
  var cur=document.querySelector('.nb.active');
  if(cur){ var pg=cur.getAttribute('data-p'); if(pg) setTimeout(function(){navTo(pg);},0); }
}

function applyTheme(theme){
  _theme=theme;
  if(theme==='light') document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('eq_theme',theme);
  var btn=document.getElementById('themeBtn');
  if(btn){ btn.style.background=theme==='light'?'#0969da':'var(--bg3)'; }
}

function toggleTheme(){ applyTheme(_theme==='dark'?'light':'dark'); }
(function(){ applyTheme(_theme); })();

/* ── INIT ───────────────────────────────────────────── */
function appInit() {
  var saved = lsGet('master');
  if (saved && saved.length) {
    state.master = saved;
  } else {
    state.master = MASTER_DB.map(function(r, i) {
      return Object.assign({}, r, { id: r.id || (i + 1) });
    });
  }
  state.companies = lsGet('companies') || [
    { id:'co1', name:'UTI (유티아이)',  industry:'디스플레이', note:'파일럿 기업', cd:'2026-04-01' },
    { id:'co2', name:'테스트기업 A',    industry:'반도체',     note:'',           cd:'2026-04-03' }
  ];
  state.setups = lsGet('setups') || {};
  if (!state.setups['co1']) {
    var ids = state.master.slice(0, 107).map(function(r){ return r.id; });
    state.setups['co1'] = { sel:ids, custom:{}, done:[], doneAt:{}, tgt:{} };
  }
  state.equipments = lsGet('equipments') || {};
  // 공정/설비업체 Master (localStorage → 없으면 초기 데이터)
  state.gongMaster   = lsGet('gongMaster')   || {};
  state.vendorMaster = lsGet('vendorMaster') || {};
  // 현재 선택 기업 탭 초기화
  _coTab = 'company';
  _coSelId = null;
  navTo('dashboard');
}

/* ── NAV ────────────────────────────────────────────── */
function adjustPageLayout(pgId) {
  // pg-hdr 실제 높이 측정 후 pg-body height 동적 조정
  requestAnimationFrame(function() {
    var pg   = gid(pgId);
    var hdr  = pg ? pg.querySelector('.pg-hdr') : null;
    var body = pg ? pg.querySelector('.pg-body') : null;
    if (!hdr || !body) return;
    var pgH  = pg.offsetHeight;
    var hdrH = hdr.offsetHeight;
    body.style.height = (pgH - hdrH - 8) + 'px';
  });
}

function navTo(p) {
  ['dashboard','master','setup','progress','equip','detail','company'].forEach(function(pg) {
    gid('pg_' + pg).style.display = (pg === p) ? 'block' : 'none';
  });
  document.querySelectorAll('.nb').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.nb[data-p="' + p + '"]');
  if (btn) btn.classList.add('active');
  // 모바일 드로어 active 동기화
  document.querySelectorAll('.mob-nb').forEach(function(b) { b.classList.remove('active'); });
  var mb = document.querySelector('.mob-nb[data-mp="' + p + '"]');
  if (mb) mb.classList.add('active');
  if      (p === 'dashboard') pgDash();
  else if (p === 'master')    pgMaster();
  else if (p === 'setup')     pgSetup();
  else if (p === 'progress')  pgProgress();
  else if (p === 'equip')     pgEquip();
  else if (p === 'detail')    pgDetail();
  else if (p === 'company')   pgCompany();
}

/* ── DASHBOARD ──────────────────────────────────────── */
function pgDash() {
  var today = new Date().toISOString().slice(0,10);
  var STEPS = INVEST_STEPS;
  // 기업 필터
  var dashSel = document.getElementById('dashCoFilter');
  var dashCoId = dashSel ? dashSel.value : '';
  var filteredCos = dashCoId
    ? state.companies.filter(function(c){ return c.id === dashCoId; })
    : state.companies;

  // ── 기업별 설비 투자 진척 집계 ──
  function calcEqInfo(coId, eq) {
    var t = eq.target || {}, a = eq.actual || {};
    var stepDone   = STEPS.filter(function(_,i){ return !!a[i]; }).length;
    var stepTotal  = STEPS.length;
    // 11단계 중 지연 (실적>목표 or 목표지났는데 실적없음)
    var delayed = STEPS.filter(function(_,i){
      var tgt=t[i]||'', act=a[i]||'';
      return (act && tgt && act>tgt) || (tgt && !act && today>tgt);
    }).length;
    return { stepDone:stepDone, stepTotal:stepTotal, delayed:delayed, pct:Math.round(stepDone/stepTotal*100) };
  }

  // ── 전체 KPI ──
  var totalCo  = filteredCos.length;
  var totalEq  = 0, doneEq=0, delayEq=0;

function mkStepBars() {
  var max = 1;
  STEPS.forEach(function(s){ var c=state.master.filter(function(r){return r['프로세스']===s.key;}).length; if(c>max)max=c; });
  return STEPS.map(function(s){
    var c = state.master.filter(function(r){return r['프로세스']===s.key;}).length;
    var w = Math.round(c/max*100);
    return '<div class="brow"><span class="blbl">' + s.e + ' ' + s.s + '</span>'
      + '<div class="btrack"><div class="bfill" style="width:' + w + '%"></div>'
      + '<span class="bval">' + c + '</span></div></div>';
  }).join('');
}

function mkCoBars(tot) {
  if (!state.companies.length) return '<p style="color:var(--t2);padding:10px">등록된 기업이 없습니다</p>';
  return state.companies.map(function(c){
    var sel = ((state.setups[c.id]||{}).sel||[]).length;
    var pct = Math.round(sel/tot*100);
    return '<div style="margin-bottom:10px"><div class="flex-sb" style="margin-bottom:3px">'
      + '<span style="font-size:17px;font-weight:500">' + xe(c.name) + '</span>'

      + '<div class="pb"><div class="pf" style="width:' + pct + '%"></div></div></div>';
  }).join('');
}

function mkReqBars(tot) {
  var types = ['필수','조건부 필수','선택','권장'];
  var colors = ['var(--gr)','var(--or)','var(--ac)','var(--pu)'];

    var c = state.master.filter(function(r){return r['필수여부']===t;}).length;

    return '<div style="flex:1;min-width:140px"><div class="flex-sb" style="margin-bottom:3px">'

function pgMaster() {
  var canE = canEdit();

  state.master.forEach(function(r){ if(r['구분'] && cats.indexOf(r['구분'])<0) cats.push(r['구분']); });
  cats.sort();

  var stepBar = '<div class="psbar">';
  STEPS.forEach(function(s, i){
    var c = state.master.filter(function(r){return r['프로세스']===s.key;}).length;
    var cls = (state.masterStep===i) ? ' active' : '';
    stepBar += '<div class="ps' + cls + '" onclick="selMS(' + i + ')">'
      + '<span class="pse">' + s.e + '</span><span class="pss">' + t(s.s) + '</span>'
      + '<span class="psn">' + c + '</span></div>';

    + '<div class="ph"><div><h1 class="pt">📋 Master DB</h1>'

/* ── ITEM MODAL ─────────────────────────────────────── */
function openEditItem(id) {
  if (!canEdit()) { toast('권한 없음','수정 권한이 없습니다.','error'); return; }
  var item = state.master.filter(function(r){ return r.id === id; })[0];
  if (!item) return;
  gid('mT').textContent = t('item_edit');
  gid('mId').value = id;
  gid('btnDel').style.display = 'inline-flex';
  fillItemModal(item);
  gid('itemModal').style.display = 'flex';
}
function openAddItem() {
  if (!canEdit()) return;
  gid('mT').textContent = t('item_add');
  gid('mId').value = '';
  gid('btnDel').style.display = 'none';
  fillItemModal({ '프로세스': STEPS[state.masterStep].key,'구분':'','세부검토항목':'','체크포인트':'','필수여부':'필수','필요문서':'','총괄담당부서':'','합의부서':'','승인부서':'','표준일정':'' });
  gid('itemModal').style.display = 'flex';
}
function fillItemModal(r) {
  gid('mProc').innerHTML = STEPS.map(function(s){
    return '<option value="' + xe(s.key) + '"' + (r['프로세스']===s.key?' selected':'') + '>' + s.s + ' (' + xe(s.key.slice(0,18)) + '...)</option>';
  }).join('');
  gid('mCat').value  = r['구분']||'';        gid('mTtl').value  = r['세부검토항목']||'';
  gid('mChk').value  = r['체크포인트']||'';   gid('mReq').value  = r['필수여부']||'필수';
  gid('mSch').value  = r['표준일정']||'';     gid('mDoc').value  = r['필요문서']||'';
  gid('mD1').value   = r['총괄담당부서']||''; gid('mD2').value   = r['합의부서']||'';
  gid('mD3').value   = r['승인부서']||'';
}
function saveItem() {
  var id = gid('mId').value;
  var u = {
    '프로세스': gid('mProc').value, '구분': gid('mCat').value,
    '세부검토항목': gid('mTtl').value, '체크포인트': gid('mChk').value,
    '필수여부': gid('mReq').value,  '표준일정': gid('mSch').value,
    '필요문서': gid('mDoc').value,  '총괄담당부서': gid('mD1').value,
    '합의부서': gid('mD2').value,   '승인부서': gid('mD3').value
  };
  if (!u['세부검토항목']) { toast('오류','항목명은 필수입니다.','error'); return; }
  if (id) {
    var idx = -1;
    state.master.forEach(function(r,i){ if(r.id===parseInt(id)) idx=i; });
    if (idx >= 0) state.master[idx] = Object.assign({}, state.master[idx], u);
    toast('저장','항목이 수정되었습니다.','success');
  } else {
    var mx = 0; state.master.forEach(function(r){ if(r.id>mx) mx=r.id; });
    state.master.push(Object.assign({}, u, { id: mx+1 }));
    toast('추가','새 항목이 추가되었습니다.','success');
  }
  saveAll(); CM('itemModal'); renderMTbl();
}
function delItem() {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  var id = parseInt(gid('mId').value);
  state.master = state.master.filter(function(r){ return r.id !== id; });
  saveAll(); CM('itemModal'); renderMTbl();
  toast('삭제','항목이 삭제되었습니다.','info');
}

function loadCo() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) {
    gid('sProcList').innerHTML = '<div class="sempty"><p>' + t('empty_co') + '</p></div>';
    gid('siBadge').innerHTML = '';
    if (gid('savebar')) gid('savebar').style.display = 'none';
    return;
  }
  if (!state.setups[coId]) state.setups[coId] = { sel:[], custom:{}, done:[], doneAt:{}, tgt:{} };
  state.setupStep = 0;
  gid('savebar').style.display = 'flex';
  renderSProc(coId);
  renderSMast();
  renderSSel();
  updBadge(coId);
}

function updBadge(coId) {
  var s   = state.setups[coId] || {};
  var cnt = (s.sel||[]).length;
  gid('siBadge').innerHTML = cnt ? '<span class="info-badge">✅ ' + cnt + '개 선택됨</span>' : '';
  if (gid('siTot')) gid('siTot').textContent = cnt + '개';
  if (gid('sSelCnt')) gid('sSelCnt').textContent = cnt + '개';
}

function renderSProc(coId) {
  var sel = {};
  ((state.setups[coId]||{}).sel||[]).forEach(function(id){ sel[id] = true; });
  gid('sProcList').innerHTML = STEPS.map(function(s, i){
    var items = state.master.filter(function(r){ return r['프로세스'] === s.key; });
    var sc    = items.filter(function(r){ return sel[r.id]; }).length;
    var cls   = state.setupStep === i ? ' active' : '';
    return '<div class="pi' + cls + '" onclick="selSStep(\'' + coId + '\',' + i + ')">'
      + '<div><div class="pnm">' + s.e + ' ' + s.s + '</div>'
      + '<div class="psb">' + items.length + '개 항목</div></div>'
      + '<div class="pst"><div class="psc">' + sc + '</div>'
      + '<div class="pstot">/ ' + items.length + '</div></div>'
      + '</div>';
  }).join('');
}

function selSStep(coId, i) {
  state.setupStep = i;
  renderSProc(coId);
  renderSMast();
  renderSSel();
}

function renderSMast() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var sel  = {};
  ((state.setups[coId]||{}).sel||[]).forEach(function(id){ sel[id] = true; });
  var q    = gid('sMSrch') ? gid('sMSrch').value.toLowerCase() : '';
  var step = STEPS[state.setupStep];
  if (gid('sMastTitle')) gid('sMastTitle').textContent = step.e + ' ' + step.key;
  var all   = state.master.filter(function(r){ return r['프로세스'] === step.key; });
  var selC  = all.filter(function(r){ return sel[r.id]; }).length;
  var items = q ? all.filter(function(r){
    return (r['세부검토항목']||'').toLowerCase().indexOf(q)>=0 || (r['체크포인트']||'').toLowerCase().indexOf(q)>=0;
  }) : all;

  if (gid('sMSrch')) gid('sMSrch').disabled = false;
  if (gid('sMastBtns')) gid('sMastBtns').innerHTML =
    '<button class="btn bxs bs" onclick="selAll(true)">' + t('btn_all') + '</button>'
    + '<button class="btn bxs bs" onclick="selAll(false)">' + t('btn_dismiss_step') + '</button>'
    + '<button class="btn bxs bw" onclick="selReq()">' + t('col_req') + '</button>';

  // 그룹별
  var groups = {}, gOrder = [];
  items.forEach(function(r){
    var g = r['구분'] || '기타';
    if (!groups[g]) { groups[g] = []; gOrder.push(g); }
    groups[g].push(r);
  });

  if (!items.length) { gid('sMastBody').innerHTML = '<div class="sempty"><div class="ei">🔍</div><p>' + t('empty_search') + '</p></div>'; return; }

  var html = '';
  gOrder.forEach(function(g){
    var gi  = groups[g];
    var gsc = gi.filter(function(r){ return sel[r.id]; }).length;
    var chk = gsc === gi.length ? ' checked' : '';
    html += '<div class="mgrp">'
      + '<span class="mgn">' + xe(g) + '</span>'
      + '<label class="mgc"><input type="checkbox"' + chk
      + ' onchange="grpChk(this,\'' + coId + '\',\'' + g.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')"'
      + '> <span>' + gsc + '/' + gi.length + '</span></label></div>';
    gi.forEach(function(r){
      var isSel = !!sel[r.id];
      html += '<div class="mcard' + (isSel?' msel':'') + '" id="mc' + r.id + '">'
        + '<input type="checkbox" class="mchk"' + (isSel?' checked':'')
        + ' onchange="togItem(\'' + coId + '\',' + r.id + ',this.checked)">'
        + '<div class="mb">'
        + '<div class="mt">' + hlQ(r['세부검토항목'], q) + '</div>'
        + '<div class="mc2">' + hlQ(r['체크포인트'], q) + '</div>'
        + '<div class="mm">' + bdg(r['필수여부']) + (r['표준일정']?'<span class="chip">⏱ '+xe(r['표준일정'])+'</span>':'') + '</div>'
        + '</div></div>';
    });
  });
  gid('sMastBody').innerHTML = html;
  updStats(coId);
}

function renderSSel() {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var s    = state.setups[coId] || {};
  var sel  = new Set(s.sel || []);
  var cust = s.custom || {};
  var tgt  = s.tgt || {};
  var key  = STEPS[state.setupStep].key;
  var items = state.master.filter(function(r){ return r['프로세스']===key && sel.has(r.id); });

  if (gid('sSelCnt')) gid('sSelCnt').textContent = (s.sel||[]).length + ' (' + t('equip_filter_proc') + ':' + items.length + ')';
  if (!items.length) {
    gid('sSelBody').innerHTML = '<div class="sempty"><div class="ei">📝</div><p>' + t('empty_sel') + '</p></div>';
    return;
  }

  gid('sSelBody').innerHTML = items.map(function(r, idx){
    var c  = cust[r.id] || {};
    var d1 = c['총괄담당부서'] !== undefined ? c['총괄담당부서'] : r['총괄담당부서']||'';
    var d2 = c['합의부서']     !== undefined ? c['합의부서']     : r['합의부서']||'';
    var d3 = c['승인부서']     !== undefined ? c['승인부서']     : r['승인부서']||'';
    var cp = c['체크포인트']   !== undefined ? c['체크포인트']   : r['체크포인트']||'';
    var dc = c['필요문서']     !== undefined ? c['필요문서']     : r['필요문서']||'';
    var rq = c['필수여부']     !== undefined ? c['필수여부']     : r['필수여부']||'필수';
    var tg = tgt[r.id] || '';

    return '<div class="sitem">'
      + '<div class="sih" onclick="togSEl(' + r.id + ')">'
      + '<span class="sin">' + (idx+1) + '</span>'
      + '<span class="sit">' + xe(r['세부검토항목']) + '</span>'
      + '<div class="flex-g">' + bdg(rq) + '<span class="stog" id="stog' + r.id + '">▶</span></div>'
      + '</div>'
      + '<div class="sib" id="sib' + r.id + '" style="display:none">'
      + '<div class="sf"><div class="sfl">' + t('col_point') + ' <span class="edit-hint">(' + t('lbl_req_notice') + ')</span></div>'
      + '<textarea class="sfta" onchange="updC(\'' + coId + '\',' + r.id + ',\'체크포인트\',this.value)">' + xe(cp) + '</textarea></div>'
      + '<div class="sfrow">'
      + '<div class="sf"><div class="sfl">' + t('col_req') + '</div>'
      + '<select class="sfin" onchange="updC(\'' + coId + '\',' + r.id + ',\'필수여부\',this.value)">'
      + [t('req_req'),t('req_cond'),t('req_opt'),t('req_rec')].map(function(v){ return '<option' + (rq===v?' selected':'') + '>' + v + '</option>'; }).join('')
      + '</select></div>'
      + '<div class="sf"><div class="sfl">' + t('col_schedule') + '</div>'
      + '<input class="sfin" placeholder="2026-05-01" value="' + xe(tg) + '" onchange="updT(\'' + coId + '\',' + r.id + ',this.value)"></div>'
      + '</div>'
      + '<div class="sf"><div class="sfl">' + t('col_doc') + ' <span class="edit-hint">(' + t('lbl_req_notice') + ')</span></div>'
      + '<input class="sfin" value="' + xe(dc) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'필요문서\',this.value)"></div>'
      + '<div class="sf"><div class="sfl">📌 ' + t('col_dept1') + ' <span class="edit-hint" style="color:var(--or)">(' + t('lbl_dept_notice') + ')</span></div>'
      + '<div class="drow">'
      + '<div><div class="dl">총괄담당</div><input class="sfin" value="' + xe(d1) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'총괄담당부서\',this.value)"></div>'
      + '<div><div class="dl">합의부서</div><input class="sfin" value="' + xe(d2) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'합의부서\',this.value)"></div>'
      + '<div><div class="dl">승인부서</div><input class="sfin" value="' + xe(d3) + '" onchange="updC(\'' + coId + '\',' + r.id + ',\'승인부서\',this.value)"></div>'
      + '</div></div>'
      + '<div style="margin-top:8px;text-align:right">'
      + '<button class="rmv" onclick="rmvItem(\'' + coId + '\',' + r.id + ')">✕ 선택 해제</button>'
      + '</div></div></div>';
  }).join('');
}

function togSEl(id) {
  var b = gid('sib' + id), t = gid('stog' + id);
  if (!b) return;
  var open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  if (t) t.style.transform = open ? '' : 'rotate(90deg)';
}

function updC(coId, id, field, val) {
  var s = state.setups[coId];
  if (!s.custom) s.custom = {};
  if (!s.custom[id]) s.custom[id] = {};
  s.custom[id][field] = val;
}
function updT(coId, id, val) {
  var s = state.setups[coId];
  if (!s.tgt) s.tgt = {};
  s.tgt[id] = val;
}

function rmvItem(coId, id) {
  var s = state.setups[coId];
  s.sel = s.sel.filter(function(x){ return x !== id; });
  if (s.custom) delete s.custom[id];
  updBadge(coId); renderSProc(coId); renderSMast(); renderSSel(); updStats(coId);
}

function togItem(coId, id, checked) {
  var s = state.setups[coId];
  if (checked) { if (s.sel.indexOf(id) < 0) s.sel.push(id); }
  else { s.sel = s.sel.filter(function(x){ return x !== id; }); if(s.custom) delete s.custom[id]; }
  var card = gid('mc' + id);
  if (card) { checked ? card.classList.add('msel') : card.classList.remove('msel'); }
  updBadge(coId); renderSProc(coId); renderSSel(); updStats(coId);
}

function grpChk(input, coId, g) {
  var items = state.master.filter(function(r){ return r['프로세스']===STEPS[state.setupStep].key && (r['구분']||'기타')===g; });
  var s = state.setups[coId];
  items.forEach(function(r){
    if (input.checked) { if (s.sel.indexOf(r.id)<0) s.sel.push(r.id); }
    else { s.sel = s.sel.filter(function(x){return x!==r.id;}); if(s.custom) delete s.custom[r.id]; }
  });
  updBadge(coId); renderSProc(coId); renderSMast(); renderSSel(); updStats(coId);
}

function selAll(checked) {
  var coId = gid('coSel') ? gid('coSel').value : '';
  if (!coId) return;
  var items = state.master.filter(function(r){ return r['프로세스']===STEPS[state.setupStep].key; });
  var s = state.setups[coId];
  if (checked) { items.forEach(function(r){ if(s.sel.indexOf(r.id)<0) s.sel.push(r.id); }); }
  else {
    var ids = {}; items.forEach(function(r){ ids[r.id]=true; });

function selReq() {

function updStats(coId) {
  var s = state.setups[coId] || {};
  var tot = (s.sel||[]).length;
  var req = state.master.filter(function(r){ return (s.sel||[]).indexOf(r.id)>=0 && r['필수여부']==='필수'; }).length;

  var siS = si.filter(function(r){ return (s.sel||[]).indexOf(r.id)>=0; }).length;

    + '<span>' + t('stat_req') + ': <b>' + req + t('master_sub') + '</b></span>';
}

function saveStp() {

function loadProg() {
  var coId = gid('prCoSel') ? gid('prCoSel').value : '';
  if (!coId) {
    gid('prStat').innerHTML = '';
    gid('prStepBar').innerHTML = '';
    gid('prBody').innerHTML = '<div class="empty"><div class="ei">📈</div><h3>' + t('empty_co') + '</h3></div>';
    return;
  }
  var s = state.setups[coId];
  if (!s || !s.sel || !s.sel.length) {
    gid('prStat').innerHTML = '';
    gid('prStepBar').innerHTML = '';
    gid('prBody').innerHTML = '<div class="empty"><div class="ei">⚙️</div><h3>' + t('empty_setup') + '</h3></div>';
    return;
  }
  if (!state.progressStep) state.progressStep = 0;
  renderProgStat(coId);
  renderProgStepBar(coId);
  renderProgItems(coId);
  adjustPageLayout('pg_progress');
}

function renderProgStat(coId) {
  var s   = state.setups[coId];
  var sel = new Set(s.sel||[]);
  var done= new Set(s.done||[]);
  var tot = sel.size, comp = done.size;
  var pct = tot ? Math.round(comp/tot*100) : 0;
  gid('prStat').innerHTML =
    '<div class="pr-stat-row">'
    + mkProgStat(t('col_task'), tot, 'var(--ac)')
    + mkProgStat(t('col_done'), comp, 'var(--gr)')
    + mkProgStat(t('prog_sub').slice(0,4), tot-comp, 'var(--or)')
    + mkProgStat(t('prog_total') || t('prog_total'), pct+'%', 'var(--pu)')
    + '</div>';
}

function renderProgStepBar(coId) {
  var s    = state.setups[coId];
  var sel  = new Set(s.sel||[]);
  var done = new Set(s.done||[]);
  var html = '<div class="pr-stepbar" id="prStepBarInner">';
  STEPS.forEach(function(step, i){
    var items = state.master.filter(function(r){ return r['프로세스']===step.key && sel.has(r.id); });
    var isActive = (state.progressStep||0) === i;
    if (!items.length) {
      html += '<div class="pr-step pr-step-empty" data-coId="' + xe(coId) + '" data-i="' + i + '">'
        + '<span class="pr-se">' + step.e + '</span>'
        + '<span class="pr-ss">' + t(step.s) + '</span>'
        + '<span class="pr-sc t3">-</span>'
        + '</div>';
      return;
    }
    var sc  = items.filter(function(r){ return done.has(r.id); }).length;
    var pct = Math.round(sc/items.length*100);
    html += '<div class="pr-step' + (isActive?' pr-active':'') + '" data-coId="' + xe(coId) + '" data-i="' + i + '">'
      + '<span class="pr-se">' + step.e + '</span>'
      + '<span class="pr-ss">' + t(step.s) + '</span>'
      + '<span class="pr-sc">' + sc + '/' + items.length + '</span>'
      + '<div class="pr-pbar"><div class="pr-pfill" style="width:' + pct + '%"></div></div>'
      + '<span class="pr-pct' + (pct===100?' pr-done':'') + '">' + pct + '%</span>'
      + '</div>';
  });
  html += '</div>';
  gid('prStepBar').innerHTML = html;
  // 이벤트 위임: 클릭 처리
  gid('prStepBar').addEventListener('click', function(e){
    var el = e.target.closest('.pr-step');
    if (!el || el.classList.contains('pr-step-empty')) return;
    var ci = el.dataset.coid || el.dataset.coId;
    var idx = parseInt(el.dataset.i);
    selProgStep(ci, idx);
  });
}


function selProgStep(coId, i) {
  state.progressStep = i;
  renderProgStepBar(coId);
  renderProgItems(coId);
}

function renderProgItems(coId) {
  var s     = state.setups[coId];
  var sel   = new Set(s.sel||[]);
  var done  = new Set(s.done||[]);
  var canE  = canEdit();
  var step  = STEPS[state.progressStep||0];
  var items = state.master.filter(function(r){ return r['프로세스']===step.key && sel.has(r.id); });

  if (!items.length) {
    gid('prBody').innerHTML = '<div class="empty" style="margin-top:30px">'
      + '<div class="ei">📭</div><h3>이 단계에 Setup된 항목이 없습니다</h3>'
      + '<p>' + t('step_setup_add') + '</p></div>';
    return;
  }

  var sc  = items.filter(function(r){ return done.has(r.id); }).length;
  var pct = Math.round(sc/items.length*100);

  var html = '<div class="pr-items-hdr">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    + '<b style="font-size:18px">' + step.e + ' ' + t(step.s) + '</b>'
    + '<span class="t2 sm">' + sc + '/' + items.length + ' ' + t('col_done') + '</span>'
    + (pct===100 ? '<span class="b br" style="margin-left:4px">✅ 완료</span>' : '')
    + '</div>'
    + '<div class="pb" style="height:7px;margin-bottom:0">'
    + '<div class="pf" style="width:' + pct + '%"></div></div>'
    + '</div>'
    + '<div class="pr-tbl-wrap">'
    + '<table class="pr-tbl"><thead><tr>'
    + '<th style="width:50px">' + t('col_done') + '</th>'
    + '<th style="width:22%">' + t('col_task') + '</th>'
    + '<th style="width:30%">' + t('col_point') + '</th>'
    + '<th style="width:80px">' + t('col_req') + '</th>'
    + '<th style="width:13%">' + t('col_dept1') + '</th>'
    + '<th style="width:11%">' + t('col_doc') + '</th>'
    + '<th style="width:10%">' + t('col_schedule') + '</th>'
    + '<th style="width:12%">' + t('col_done') + '</th>'
    + '</tr></thead><tbody>';

  items.forEach(function(r){
    var isDone = done.has(r.id);
    var c  = (s.custom||{})[r.id] || {};
    var dp = c['총괄담당부서'] !== undefined ? c['총괄담당부서'] : r['총괄담당부서']||'';
    var dc = c['필요문서']     !== undefined ? c['필요문서']     : r['필요문서']||'';
    var tg = (s.tgt||{})[r.id] || '';
    var da = (s.doneAt||{})[r.id] || '';
    var rq = c['필수여부']     !== undefined ? c['필수여부']     : r['필수여부'];
    var cp = c['체크포인트']   !== undefined ? c['체크포인트']   : r['체크포인트']||'';
    html += '<tr class="pr-row' + (isDone?' pr-done-row':'') + '">'
      + '<td style="text-align:center;vertical-align:middle">'
      + (canE
        ? '<input type="checkbox"' + (isDone?' checked':'') + ' class="pr-chk"'
          + ' data-coid="' + xe(coId) + '" data-id="' + r.id + '">'
        : (isDone ? '✅' : '⬜'))
      + '</td>'
      + '<td class="fw">' + xe(r['세부검토항목']) + '</td>'
      + '<td class="t2 sm">' + xe(cp) + '</td>'
      + '<td>' + bdg(rq) + '</td>'
      + '<td class="sm">' + xe(dp) + '</td>'
      + '<td class="t2 sm">' + xe(dc) + '</td>'
      + '<td class="t2 sm">' + xe(tg) + '</td>'
      + '<td class="t3 sm">' + xe(da) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div></div>';
  gid('prBody').innerHTML = html;

  // 체크박스 이벤트 위임
  gid('prBody').addEventListener('change', function(e){
    var inp = e.target;
    if (!inp || !inp.classList.contains('pr-chk')) return;
    var cid = inp.dataset.coid;
    var rid = parseInt(inp.dataset.id);
    togDone(cid, rid, inp.checked);
  });
}


function renderProg() { loadProg(); }

function togDone(coId, id, checked) {
  var s = state.setups[coId];
  if (!s.done)   s.done   = [];
  if (!s.doneAt) s.doneAt = {};
  if (checked) { if (s.done.indexOf(id)<0) s.done.push(id); s.doneAt[id] = new Date().toLocaleString('ko-KR'); }
  else { s.done = s.done.filter(function(x){return x!==id;}); delete s.doneAt[id]; }
  saveAll();
  renderProgStat(coId);
  renderProgStepBar(coId);
  renderProgItems(coId);
}

  }

  if (vendSel) {
    var vends = _getVend(coId);
    vendSel.innerHTML = '<option value="">' + t('equip_filter_vend') + '</option>'
      + vends.map(function(v){ return '<option value="' + xe(v.code) + '">' + xe(v.name) + '</option>'; }).join('');

function renderEquipStat2(coId) {
  var eqs = state.equipments[coId] || [];
  var tot = eqs.length;
  var done100 = eqs.filter(function(eq){ return calcEqPct2(eq) === 100; }).length;
  var avgPct = tot ? Math.round(eqs.reduce(function(a,eq){ return a + calcEqPct2(eq); }, 0) / tot) : 0;
  var totalAmt = eqs.reduce(function(a,eq){ return a + (parseFloat((eq.amt||'').replace(/,/g,''))||0); }, 0);
  gid('eqStatRow').innerHTML =
    '<div class="eq-stat-card"><span class="eq-stat-lbl">🏭 총 설비</span><span class="eq-stat-val" style="color:var(--ac)">' + tot + ' ' + t('col_eq') + '</span></div>'
    + '<div class="eq-stat-card"><span class="eq-stat-lbl">✅ 양산 완료</span><span class="eq-stat-val" style="color:var(--gr)">' + done100 + ' ' + t('col_eq') + '</span></div>'
    + '<div class="eq-stat-card"><span class="eq-stat-lbl">📊 평균 진행률</span><span class="eq-stat-val" style="color:var(--pu)">' + avgPct + '%</span></div>'
    + '<div class="eq-stat-card"><span class="eq-stat-lbl">💰 투자금액</span><span class="eq-stat-val" style="color:var(--or);font-size:15px">' + (totalAmt ? fmtAmt(totalAmt) : '-') + '</span></div>';
}

function fmtAmt(v) {
  if (v >= 1e8) return (v/1e8).toFixed(1) + '억원';
  if (v >= 1e4) return (v/1e4).toFixed(0) + '만원';
  return v.toLocaleString() + '원';
}

function calcEqPct2(eq) {
  var done = 0, tot = INVEST_STEPS.length;
  INVEST_STEPS.forEach(function(s, i) {
    if ((eq.actual||{})[i]) done++;
  });
  return Math.round(done / tot * 100);
}

function getStepStatus(eq, si) {
  var actual = (eq.actual||{})[si] || '';
  var target = (eq.target||{})[si] || '';
  if (actual) {
    if (target && actual > target) return 'delay';
    return 'done';
  }
  if (target) {
    var today = new Date().toISOString().slice(0,10);
    if (today > target) return 'delay';
    return 'wip';
  }
  return '';
}

function eqSaveDate(inp) {
  var coId = inp.dataset.coid;
  var idx  = parseInt(inp.dataset.idx);
  var si   = parseInt(inp.dataset.si);
  var type = inp.dataset.type; // 'target' or 'actual'
  var val  = inp.value;

  var eq = state.equipments[coId][idx];
  if (!eq.target) eq.target = {};
  if (!eq.actual) eq.actual = {};
  if (type === 'target') eq.target[si] = val;
  else eq.actual[si] = val;

  saveAll();

  // 실적일 지연 색상 처리
  if (type === 'actual') {
    var tgtVal = (eq.target||{})[si]||'';
    var actVal = val;
    inp.classList.remove('eq-date-delay');
    if (actVal && tgtVal && actVal > tgtVal) {
      inp.classList.add('eq-date-delay');
    }
  }
  // 목표일 변경 시: 해당 단계 실적 input도 지연 재계산
  if (type === 'target') {
    var actInp = inp.closest('tr') ? inp.closest('tr').querySelector('input[data-si="' + si + '"][data-type="actual"]') : null;
    if (actInp) {
      var actVal2 = actInp.value;
      actInp.classList.remove('eq-date-delay');
      if (actVal2 && val && actVal2 > val) actInp.classList.add('eq-date-delay');
    }
  }

  // 셀 배경색 갱신 (부분)
  var status = getStepStatus(eq, si);
  var td = inp.closest('td');
  if (td) {
    td.classList.remove('eq-step-done','eq-step-delay','eq-step-wip');
    if (status) td.classList.add('eq-step-' + status);
  }

  // 진행률 칸 갱신
  renderEquipStat2(coId);
  var row = inp.closest('tr');
  if (row) {
    var pctCell = row.querySelector('.eq-pct-cell');
    if (pctCell) {
      var pct = calcEqPct2(eq);
      var pctColor = pct === 100 ? 'var(--gr)' : pct >= 50 ? 'var(--ac)' : 'var(--or)';
      pctCell.innerHTML = '<div class="eq-pct-val" style="color:' + pctColor + '">' + pct + '%</div>'
        + '<div class="eq-mini-bar"><div class="eq-mini-fill" style="width:' + pct + '%;background:' + pctColor + '"></div></div>';
    }
  }
}
